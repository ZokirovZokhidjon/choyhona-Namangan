<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ширин таомлар - Чойхона</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Ruslan+Display&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #1a0f00; --card: #2c1a01; }
        body { background: var(--bg); color: #f4e4bc; font-family: 'Alice', serif; margin: 0; }

        header { background: var(--card); padding: 15px 0; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-link { color: #f4e4bc; text-decoration: none; font-weight: bold; padding: 8px 18px; border-radius: 20px; font-size: 14px; }
        .active-link { background: var(--gold); color: #1a0f00; }

        .main-wrapper { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; }

        /* ЧАП ТОМОН - МАҚОЛА КЎРИНАДИГАН ЖОЙ */
        .content-area { flex: 3; min-height: 500px; }
        
        .recipe-display { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--gold);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .recipe-img { width: 100%; max-height: 450px; object-fit: cover; }
        .recipe-info { padding: 30px; }
        .recipe-info h2 { font-family: 'Ruslan Display', cursive; color: var(--gold); font-size: 32px; margin-top: 0; }
        .recipe-text { line-height: 1.8; font-size: 20px; white-space: pre-line; }

        /* ЎНГ ТОМОН - SIDEBAR РЎЙХАТИ */
        .sidebar-area { flex: 1; min-width: 280px; }
        .sidebar-widget { 
            background: var(--card); 
            border: 1px solid var(--gold); 
            border-radius: 10px; 
            padding: 20px; 
            position: sticky; 
            top: 90px; 
        }
        .widget-h3 { font-family: 'Ruslan Display', cursive; color: var(--gold); text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }
        
        .sidebar-nav { list-style: none; padding: 0; }
        .sidebar-nav li { margin-bottom: 10px; }
        .sidebar-nav button { 
            background: none; border: none; color: #f4e4bc; font-family: 'Alice', serif;
            font-size: 16px; text-align: left; cursor: pointer; transition: 0.3s;
            width: 100%; padding: 10px; border-radius: 5px; border-left: 3px solid transparent;
        }
        .sidebar-nav button:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-left-color: var(--gold); }
        .sidebar-nav button.active-item { background: rgba(212, 175, 55, 0.2); color: var(--gold); border-left-color: var(--gold); font-weight: bold; }

        @media (max-width: 850px) { .main-wrapper { flex-direction: column-reverse; } .sidebar-area { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="nav-link">Асосий саҳифа</a>
        <a href="health.html" class="nav-link">Саломатлик</a>
        <a href="poetry.html" class="nav-link">Шеърият</a>
        <a href="cockes.html" class="nav-link active-link">Ширин таомлар</a>
        <a href="radio.html" class="nav-link">Радио</a>
    </div>
</header>

<div class="main-wrapper">
    <main class="content-area" id="main-view">
        <div class="recipe-display" style="padding: 50px; text-align: center;">
            <h2 style="color: var(--gold);">🍲 Чойхона Ошхонаси</h2>
            <p>Ўнг томондаги рўйхатдан бирор таомни танланг...</p>
        </div>
    </main>

    <aside class="sidebar-area">
        <div class="sidebar-widget">
            <h3 class="widget-h3">📜 МЕНЮ</h3>
            <div id="links-list" class="sidebar-nav">
                </div>
        </div>
    </aside>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
        authDomain: "namanganchayhana.firebaseapp.com",
        databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "namanganchayhana",
        storageBucket: "namanganchayhana.firebasestorage.app",
        messagingSenderId: "760810654853",
        appId: "1:760810654853:web:f851116bc7a621e4c52dec"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allPosts = {}; // Маълумотларни вақтинча сақлаш учун

    function initPage() {
        const linksBox = document.getElementById('links-list');

        db.ref('posts/cockes').on('value', (snapshot) => {
            linksBox.innerHTML = "";
            let firstKey = null;

            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                allPosts[key] = data; // Маълумотни хотирага оламиз
                if(!firstKey) firstKey = key;

                // Ўнг томон учун тугма яратамиз
                linksBox.innerHTML = `
                    <li>
                        <button onclick="showPost('${key}', this)">
                           ● ${data.title}
                        </button>
                    </li>
                ` + linksBox.innerHTML;
            });

            // Саҳифа очилганда биринчи мақолани автоматик кўрсатиш
            if(firstKey) {
                const firstBtn = linksBox.querySelector('button');
                showPost(firstKey, firstBtn);
            }
        });
    }

    function showPost(key, btnElement) {
        const display = document.getElementById('main-view');
        const data = allPosts[key];

        // Тугмалар стилини янгилаш
        document.querySelectorAll('.sidebar-nav button').forEach(b => b.className = "");
        if(btnElement) btnElement.className = "active-item";

        // Чап томонни янгилаш
        const imgHtml = data.image ? `<img src="${data.image}" class="recipe-img">` : "";
        const videoHtml = data.iframe ? `<div class="video-wrapper">${data.iframe}</div>` : "";

        display.innerHTML = `
            <div class="recipe-display">
                ${videoHtml}
                ${imgHtml}
                <div class="recipe-info">
                    <h2>${data.title}</h2>
                    <div class="recipe-text">${data.text}</div>
                    <p style="margin-top:20px; font-size:12px; opacity:0.5;">🗓 Сана: ${data.time || ''}</p>
                </div>
            </div>
        `;
        
        // Тепага сирпаниб чиқиш (мобил учун қулай)
        if(window.innerWidth < 850) {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }

    window.onload = initPage;
</script>

</body>
</html>
