<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона - Миллий ва Замонавий Портал</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-orange: #ff6a00; 
            --dark-space: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: white; margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Навигация (Header) */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon-blue);
            padding: 10px 5%;
            position: sticky; top: 0; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            height: 60px;
        }

        .logo { 
            font-size: 22px; font-weight: 800; color: var(--neon-blue); 
            text-decoration: none; display: flex; align-items: center; gap: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* Меню тугмалари (Desktop) */
        .nav-links { display: flex; gap: 5px; }
        .nav-links a { 
            color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 10px 15px; border-radius: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-links a:hover, .nav-links a.active { 
            background: var(--glass); color: var(--neon-blue); 
        }

        /* Мобил меню учун бургер тугмаси */
        .mobile-menu-btn { 
            display: none; color: white; font-size: 24px; cursor: pointer; 
        }

        /* Асосий контейнер */
        .main-container { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }

        /* Постлар сеткаси */
        #content-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; margin-top: 30px;
        }

        .post-card {
            background: var(--glass); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .post-card:hover { transform: translateY(-8px); border-color: var(--neon-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .post-img-box { position: relative; width: 100%; height: 200px; overflow: hidden; }
        .post-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .post-card:hover .post-img { scale: 1.1; }

        .play-overlay { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s;
        }
        .post-card:hover .play-overlay { opacity: 1; }

        .post-body { padding: 20px; flex-grow: 1; }
        .post-category { 
            font-size: 11px; text-transform: uppercase; color: var(--neon-orange); 
            font-weight: bold; letter-spacing: 1px; margin-bottom: 10px;
        }
        .post-title { font-size: 19px; margin: 0 0 12px 0; font-weight: 700; color: #fff; line-height: 1.3; }
        .post-text { font-size: 14px; color: #94a3b8; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .post-footer { 
            padding: 15px 20px; background: rgba(0,0,0,0.2); 
            font-size: 12px; color: #64748b; display: flex; justify-content: space-between;
        }

        /* МОБИЛ СОЗЛАМАЛАР */
        @media (max-width: 950px) {
            .nav-links { 
                position: fixed; top: 60px; left: -100%; width: 100%; height: calc(100vh - 60px);
                background: #0f172a; flex-direction: column; padding: 20px; transition: 0.4s;
                gap: 10px; z-index: 1500;
            }
            .nav-links.active { left: 0; }
            .mobile-menu-btn { display: block; }
            .nav-links a { font-size: 18px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        }

        @media (max-width: 500px) {
            #content-wall { grid-template-columns: 1fr; }
            .main-container { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <i class="fas fa-galaxy" style="color: var(--neon-orange);"></i> ЧОЙХОНА
    </a>
    
    <nav class="nav-links" id="menu">
        <a href="index.html" class="active"><i class="fas fa-home"></i> Асосий</a>
        <a href="cinema.html"><i class="fas fa-film"></i> Кинотеатр</a>
        <a href="radio.html"><i class="fas fa-radio"></i> Радио</a>
        <a href="poetry.html"><i class="fas fa-pen-nib"></i> Шеърият</a>
        <a href="fishing.html"><i class="fas fa-fish"></i> Балиқ ови</a>
        <a href="health.html"><i class="fas fa-heartbeat"></i> Саломатлик</a>
        <a href="admin.html"><i class="fas fa-user-lock"></i> Админ</a>
    </nav>

    <div class="mobile-menu-btn" onclick="toggleMenu()">
        <i class="fas fa-bars" id="menu-icon"></i>
    </div>
</header>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon-blue); padding-left: 15px; margin-bottom: 20px;">
        <h2 style="margin: 0;">Сўнгги Янгиликлар</h2>
        <span style="color: var(--neon-blue); font-size: 13px;"><i class="fas fa-circle fa-fade"></i> LIVE</span>
    </div>

    <div id="content-wall">
        </div>
</div>

<script>
    function loadContent() {
        const wall = document.getElementById('content-wall');
        const db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];

        // Агар маълумот бўлмаса
        if (db.length === 0) {
            wall.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 80px 20px;">
                <i class="fas fa-folder-open fa-3x" style="color: #1e293b; margin-bottom: 20px;"></i>
                <h3 style="color: #475569;">Контент мавжуд эмас</h3>
            </div>`;
            return;
        }

        wall.innerHTML = "";

        // ФИЛТР: Фақат "Асосий саҳифа" (main) ёки "Янгиликлар" (news) учун мўлжалланган постларни чиқарамиз
        // Киноларни (detective, action, retro ва ҳ.к.) бу ерда чиқармаймиз
        const mainPosts = db.filter(item => item.category === 'main' || item.category === 'news');

        if (mainPosts.length === 0) {
            wall.innerHTML = "<p style='text-align:center; width:100%;'>Асосий саҳифа учун мақолалар юкланмаган.</p>";
            return;
        }

        mainPosts.reverse().forEach(item => {
            let imageSrc = item.image ? item.image : (item.video ? `https://img.youtube.com/vi/${item.video}/maxresdefault.jpg` : 'https://via.placeholder.com/400x225?text=Choyhona');

            wall.innerHTML += `
                <div class="post-card">
                    <div class="post-img-box">
                        <img src="${imageSrc}" class="post-img" alt="img">
                    </div>
                    <div class="post-body">
                        <div class="post-category">${item.category === 'main' ? 'Асосий' : 'Янгилик'}</div>
                        <h3 class="post-title">${item.title}</h3>
                        <p class="post-text">${item.content}</p>
                    </div>
                    <div class="post-footer">
                        <span><i class="far fa-calendar-alt"></i> ${item.date.split(',')[0]}</span>
                        <span><i class="far fa-eye"></i> ${item.views || 0}</span>
                    </div>
                </div>`;
        });
    }

    window.onload = loadContent;
</script>

</body>
</html>
