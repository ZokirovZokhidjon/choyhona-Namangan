<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона Пойтахт - Шарқона Портал</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --blue: #0a192f;
            --orange: #ff6a00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--blue); color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/oriental-tiles.png');
        }

        /* --- HEADER & LOGOS --- */
        header {
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-box img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); }

        /* --- NAVIGATION --- */
        .nav-menu { display: flex; gap: 15px; }
        .nav-menu a {
            color: white; text-decoration: none; font-size: 14px; font-weight: 500;
            transition: 0.3s; padding: 5px 10px; border-radius: 8px;
        }
        .nav-menu a:hover, .nav-menu a.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* МЕГA-МEНЮ (Мобил учун гамбургер) */
        .menu-toggle { display: none; color: var(--gold); font-size: 24px; cursor: pointer; }

        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            .nav-menu {
                display: none; /* Телефонда яшириш */
                flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%;
                background: #112240; border-bottom: 2px solid var(--gold); padding: 20px; box-sizing: border-box;
            }
            .nav-menu.active { display: flex; } /* Тугма босилганда чиқариш */
            .nav-menu a { font-size: 18px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        }

        /* --- КАРТОЧКАЛАР --- */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .post-card {
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px; overflow: hidden; transition: 0.4s; position: relative;
        }
        .post-card:hover { transform: translateY(-8px); border-color: var(--gold); }

        .card-img { width: 100%; height: 180px; object-fit: cover; }
        
        .tea-master {
            position: absolute; top: 160px; right: 20px;
            background: var(--gold); color: black; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-body { padding: 30px 20px 20px; }
        .card-body h3 { margin: 0 0 10px; font-size: 1.2rem; color: var(--gold); }
        .card-body p { font-size: 14px; color: #a0aec0; line-height: 1.5; height: 65px; overflow: hidden; }

        .card-footer {
            padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; font-size: 11px; color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box"><img src="log.webp" alt="L1"></div>

        <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>

        <nav class="nav-menu" id="nav-menu">
            <a href="index.html" class="active">Асосий</a>
            <a href="cinema.html">Кинотеатр</a>
            <a href="radio.html">Радио</a>
            <a href="poetry.html">Шеърият</a>
            <a href="fishing.html">Балиқ ови</a>
            <a href="health.html">Саломатлик</a>
            <a href="admin.html" style="color: var(--orange);">Админ</a>
        </nav>

        <div class="logo-box"><img src="logo.webp" alt="L2"></div>
    </header>

    <div class="container">
        <h2 style="text-align:center; color:var(--gold); letter-spacing:2px;">ХУШ КЕЛИБСИЗ</h2>
        <div class="grid" id="data-container">
            </div>
    </div>

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDGW-7Yhgx7myEpz9rlzrbtExwb03tnszs",
            authDomain: "chayhananamangan.firebaseapp.com",
            projectId: "chayhananamangan",
            storageBucket: "chayhananamangan.firebasestorage.app",
            messagingSenderId: "600906823282",
            appId: "1:600906823282:web:e6756453dcb3351ffe34eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Мобил менюни очиш/ёпиш
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }

        // Маълумотларни юклаш
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
            const container = document.getElementById('data-container');
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                let img = p.image || (p.video ? `https://img.youtube.com/vi/${p.video}/maxresdefault.jpg` : 'https://via.placeholder.com/400x200');
                
                container.innerHTML += `
                    <div class="post-card">
                        <img src="${img}" class="card-img">
                        <div class="tea-master"><i class="fas fa-mug-hot"></i></div>
                        <div class="card-body">
                            <small style="color:var(--orange)">${p.category}</small>
                            <h3>${p.title}</h3>
                            <p>${p.content}</p>
                        </div>
                        <div class="card-footer">
                            <span><i class="far fa-clock"></i> ${p.date}</span>
                            <span style="color:var(--gold); cursor:pointer">Ўқиш <i class="fas fa-arrow-right"></i></span>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
