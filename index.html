<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Чойхона</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --secondary: #ff6a00; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .admin-container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 16px; box-sizing: border-box;
        }

        input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; }

        .btn-submit { 
            width: 100%; padding: 15px; background: var(--primary); color: #000; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .btn-submit:hover { background: var(--secondary); color: white; }

        .nav-back { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
        
        /* Мобил созламалар */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .admin-container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h2><i class="fas fa-user-shield"></i> БОШҚАРУВ ПАНЕЛИ</h2>
    
    <div class="form-group">
        <label>Сарлавҳа (Title)</label>
        <input type="text" id="post-title" placeholder="Мақола ёки фильм номи...">
    </div>

    <div class="form-group">
        <label>Категория (Қаерда чиқсин?)</label>
        <select id="post-category">
            <optgroup label="Умумий">
                <option value="main">Асосий саҳифа</option>
                <option value="news">Янгиликлар</option>
            </optgroup>
            <optgroup label="Кинотеатр">
                <option value="detective">Кино: Детектив</option>
                <option value="action">Кино: Боевик</option>
                <option value="retro-ссср">Кино: Ретро СССР</option>
                <option value="comedy">Кино: Комедия</option>
            </optgroup>
            <optgroup label="Бошқалар">
                <option value="poetry">Шеърият</option>
                <option value="fishing">Балиқ ови</option>
                <option value="health">Саломатлик</option>
            </optgroup>
        </select>
    </div>

    <div class="form-group">
        <label>Пост тури</label>
        <select id="post-type" onchange="toggleInputs()">
            <option value="article">Оддий мақола (Расм билан)</option>
            <option value="video">Видео (YouTube линк)</option>
        </select>
    </div>

    <div class="form-group" id="image-input-group">
        <label>Расм линки (ImgBB дан)</label>
        <input type="text" id="post-image" placeholder="https://i.ibb.co/...">
    </div>

    <div class="form-group" id="video-input-group" style="display:none;">
        <label>YouTube Видео ID</label>
        <input type="text" id="post-video" placeholder="Масалан: dQw4w9WgXcQ">
    </div>

    <div class="form-group">
        <label>Батафсил маълумот / Матн</label>
        <textarea id="post-content" rows="5" placeholder="Мақола матнини шу ерга ёзинг..."></textarea>
    </div>

    <button class="btn-submit" onclick="savePost()">ПОСТНИ ЖОЙЛАШ</button>
    
    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Сайтга қайтиш</a>
</div>

<script>
    function toggleInputs() {
        const type = document.getElementById('post-type').value;
        document.getElementById('image-input-group').style.display = (type === 'article') ? 'block' : 'none';
        document.getElementById('video-input-group').style.display = (type === 'video') ? 'block' : 'none';
    }

    function savePost() {
        const title = document.getElementById('post-title').value;
        const category = document.getElementById('post-category').value;
        const type = document.getElementById('post-type').value;
        const image = document.getElementById('post-image').value;
        const video = document.getElementById('post-video').value;
        const content = document.getElementById('post-content').value;

        if(!title || !content) {
            alert("Илтимос, сарлавҳа ва матнни тўлдиринг!");
            return;
        }

        const newPost = {
            id: Date.now(),
            title: title,
            category: category,
            type: type,
            image: image,
            video: video,
            content: content,
            date: new Date().toLocaleString(),
            views: 0
        };

        let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        db.push(newPost);
        localStorage.setItem('choyhona_posts', JSON.stringify(db));

        alert("Муваффақиятли қўшилди!");
        window.location.href = "index.html"; // Пост қўшилгач асосий бетга қайтади
    }
</script>

</body>
</html>
