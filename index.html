 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choyxonamiz - Янгиликлар</title>
    <link href="https://fonts.googleapis.com/css2?family=Ruslan+Display&family=Alice&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #1a0f00; color: #f4e4bc; font-family: 'Alice', serif; margin: 0; }
        
        /* Сарлавҳа ва Меню (Аввалгидек қолади) */
        .choy { text-align: center; padding: 30px; background: #2c1a01; border-bottom: 4px double #d4af37; }
        .choy h1 { font-family: 'Ruslan Display', cursive; color: #d4af37; margin: 10px 0; }
        .choy img { border-radius: 50%; border: 3px groove gold; }

        .container-menu { background: #2c1a01; padding: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #d4af37; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .mnu-link, .dropbtn { text-decoration: none; color: #f4e4bc; font-weight: bold; padding: 10px 20px; font-size: 17px; background: none; border: none; cursor: pointer; font-family: 'Alice', serif; }
        .mnu-link:hover, .dropbtn:hover { color: #d4af37; }

        /* МАҚОЛАЛАР СЕТКАСИ (GRID) */
        .content-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        .mini-card { 
            background: #2c1a01; 
            border: 1px solid #d4af37; 
            border-radius: 10px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            transition: 0.3s;
        }
        .mini-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        
        .mini-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #d4af37; }
        
        .card-body { padding: 15px; flex-grow: 1; }
        .card-body h3 { color: #d4af37; font-size: 20px; margin: 0 0 10px 0; font-family: 'Ruslan Display', cursive; }
        .card-body p { font-size: 15px; opacity: 0.8; line-height: 1.4; height: 60px; overflow: hidden; }

        .read-more { 
            background: #d4af37; 
            color: #1a0f00; 
            text-align: center; 
            padding: 10px; 
            text-decoration: none; 
            font-weight: bold; 
            cursor: pointer;
            border: none;
            width: 100%;
            display: block;
        }

        /* МОДАЛ ОЙНА (ТУЛИҚ МАТН УЧУН) */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            overflow-y: auto;
        }
        .modal-content { 
            background: #2c1a01; 
            margin: 5% auto; 
            padding: 30px; 
            width: 80%; 
            max-width: 800px; 
            border: 2px solid #d4af37; 
            border-radius: 15px; 
            position: relative;
        }
        .close-btn { position: absolute; right: 20px; top: 10px; color: #d4af37; font-size: 40px; cursor: pointer; }
        
        .full-video { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 20px; }
        .full-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="choy">
        <img src="logos.jpg" alt="logo" width="120">
        <h1>ЧОЙХОНАМИЗГА ХУШ КЕЛИБСИЗ!!</h1>
    </div>

    <div class="container-menu" id="menu">
        <a href="index.html" class="mnu-link">Асосий саҳифа</a>
        <a href="cinema.html" class="mnu-link">Кинотеатр</a>
        <a href="health.html" class="mnu-link">Саломатлик</a>
        <a href="cockes.html" class="mnu-link">Ширин таомлар</a>
        <a href="poetry.html" class="mnu-link">Шеърият</a>
        <a href="admin.html" class="mnu-link">Админ</a>
        <a href="radio.html" class="mnu-link">Онлайн Радио</a>
    </div>

    <div class="content-grid" id="posts-container">
        <p style="text-align: center; grid-column: 1/-1;">Юкланмоқда... ⏳</p>
    </div>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-data"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
            authDomain: "namanganchayhana.firebaseapp.com",
            databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "namanganchayhana",
            storageBucket: "namanganchayhana.firebasestorage.app",
            messagingSenderId: "760810654853",
            appId: "1:760810654853:web:f851116bc7a621e4c52dec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadPosts() {
            const container = document.getElementById('posts-container');
            db.ref('posts/main').on('value', (snapshot) => {
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const key = child.key;
                    
                    const imgUrl = data.image || 'https://via.placeholder.com/300x180?text=Choyhona';
                    const shortText = data.text.substring(0, 100) + "...";

                    container.innerHTML = `
                        <div class="mini-card">
                            <img src="${imgUrl}" alt="img">
                            <div class="card-body">
                                <h3>${data.title}</h3>
                                <p>${shortText}</p>
                            </div>
                            <button class="read-more" onclick="openFull('${key}')">БАТАФСИЛ ЎҚИШ ➔</button>
                        </div>
                    ` + container.innerHTML;
                });
            });
        }

        function openFull(id) {
            const modal = document.getElementById('articleModal');
            const content = document.getElementById('modal-data');
            
            db.ref('posts/main/' + id).once('value', (snap) => {
                const data = snap.val();
                const video = data.iframe ? `<div class="full-video">${data.iframe}</div>` : "";
                const image = data.image ? `<img src="${data.image}" style="width:100%; border-radius:10px; margin-bottom:20px;">` : "";
                
                content.innerHTML = `
                    <h2 style="color:#d4af37; font-family:'Ruslan Display';">${data.title}</h2>
                    <p style="font-size:13px; opacity:0.6;">📅 ${data.time}</p>
                    <hr border="1" color="#3d2602">
                    ${video}
                    ${image}
                    <div style="font-size:19px; line-height:1.8; white-space: pre-line;">${data.text}</div>
                `;
                modal.style.display = "block";
                document.body.style.overflow = "hidden"; // Орқадаги экранни қотириш
            });
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('articleModal')) closeModal();
        }

        window.onload = loadPosts;
    </script>
</body>
</html>
