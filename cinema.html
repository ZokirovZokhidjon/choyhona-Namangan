<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона Кинотеатри</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Навигация ва Меню */
        header {
            background: rgba(22, 27, 34, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .nav-links { display: flex; gap: 20px; align-items: center; }

        /* Dropdown Жанрлар */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: transparent;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .dropbtn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card-bg);
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            z-index: 1;
        }
        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: 0.2s;
        }
        .dropdown-content a:hover { background-color: #00d4ff22; color: var(--neon-blue); }
        .dropdown:hover .dropdown-content { display: block; }

        /* Кино контейнери */
        .container { padding: 30px 5%; }
        .genre-title { border-left: 4px solid var(--neon-blue); padding-left: 15px; margin-bottom: 25px; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Плеер дизайни (Rutube услубида) */
        .movie-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #30363d;
        }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-bottom: 3px solid var(--neon-blue);
            box-shadow: inset 0 0 20px var(--neon-blue);
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .movie-info { padding: 15px; }
        .movie-info h3 { margin: 0 0 10px 0; font-size: 18px; color: #fff; }
        .movie-tag { 
            background: rgba(0, 212, 255, 0.1); 
            color: var(--neon-blue); 
            padding: 3px 10px; 
            font-size: 12px; 
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ЧОЙХОНА <span style="color:white">CINEMA</span></div>
    <div class="nav-links">
        <a href="index.html" style="color:white; text-decoration:none">Асосий</a>
        <div class="dropdown">
            <button class="dropbtn">Жанрлар <i class="fa fa-caret-down"></i></button>
            <div class="dropdown-content">
                <a href="#" onclick="filterMovies('all')">Ҳаммаси</a>
                <a href="#" onclick="filterMovies('detective')">Детектив</a>
                <a href="#" onclick="filterMovies('drama')">Драма</a>
                <a href="#" onclick="filterMovies('horror')">Қўрқинчли</a>
                <a href="#" onclick="filterMovies('fishing')">Саргузашт (Балиқ ови)</a>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <h2 class="genre-title" id="current-genre">Барча фильмлар</h2>
    <div class="movie-grid" id="cinema-feed">
        </div>
</div>

<script>
    function loadCinema() {
        const feed = document.getElementById('cinema-feed');
        let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        
        // Фақат видеоси бор постларни филтрлаймиз
        const movies = db.filter(post => post.video && post.video !== "");

        if(movies.length === 0) {
            feed.innerHTML = "<p>Ҳозирча фильмлар қўшилмаган. Админ панелдан видео қўшинг.</p>";
            return;
        }

        renderMovies(movies);
    }

    function renderMovies(movies) {
        const feed = document.getElementById('cinema-feed');
        feed.innerHTML = "";

        movies.reverse().forEach(movie => {
            feed.innerHTML += `
                <div class="movie-card">
                    <div class="player-wrapper">
                        <iframe src="https://www.youtube.com/embed/${movie.video}" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                        </iframe>
                    </div>
                    <div class="movie-info">
                        <span class="movie-tag">${movie.category.toUpperCase()}</span>
                        <h3>${movie.title}</h3>
                        <small style="color:#8b949e"><i class="fa fa-calendar"></i> ${movie.date}</small>
                    </div>
                </div>
            `;
        });
    }

    function filterMovies(genre) {
        let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const movies = db.filter(post => post.video && post.video !== "");
        
        const title = document.getElementById('current-genre');
        
        if(genre === 'all') {
            title.innerText = "Барча фильмлар";
            renderMovies(movies);
        } else {
            const filtered = movies.filter(m => m.category === genre);
            title.innerText = genre.toUpperCase();
            renderMovies(filtered);
        }
    }

    window.onload = loadCinema;
</script>

</body>
</html>
