<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choyhona - Кинотеатр</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Ruslan+Display&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background: #0f0a00; color: #f4e4bc; font-family: 'Alice', serif; margin: 0; }
        header { background: #1a1201; padding: 20px; text-align: center; border-bottom: 2px solid #007bff; }
        h1 { font-family: 'Ruslan Display', cursive; color: #007bff; margin: 0; font-size: 35px; }

        .genre-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 20px; background: #140d00; }
        .genre-btn { background: none; border: 1px solid #007bff; color: #007bff; padding: 8px 15px; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 14px; }
        .genre-btn:hover, .genre-btn.active { background: #007bff; color: #fff; box-shadow: 0 0 10px rgba(0,123,255,0.5); }

        .cinema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 30px; }
        .video-card { background: #1a1201; border: 1px solid #007bff; border-radius: 10px; overflow: hidden; }
        .video-container { width: 100%; height: 200px; background: #000; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .card-info { padding: 15px; }
        .card-info h3 { color: #007bff; margin: 0 0 10px 0; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h1>КИНOТЕАТР</h1>
</header>

<div class="genre-nav">
    <a href="index.html" class="genre-btn" style="text-decoration: none; background: #3d2602; border-color: #d4af37; color: #d4af37;">🏠 Асосий саҳифа</a>
    
    <button class="genre-btn active" onclick="loadMovies('all', event)">Ҳаммаси</button>
    <button class="genre-btn" onclick="loadMovies('cinema_drama', event)">Драма</button>
    <button class="genre-btn" onclick="loadMovies('cinema_triller', event)">Триллер</button>
    <button class="genre-btn" onclick="loadMovies('cinema_komediya', event)">Комедия</button>
    <button class="genre-btn" onclick="loadMovies('cinema_jangari', event)">Боевик</button>
    <button class="genre-btn" onclick="loadMovies('cinema_fantastika', event)">Фантастика</button>
    <button class="genre-btn" onclick="loadMovies('cinema_sarguzasht', event)">Приключения</button>
    <button class="genre-btn" onclick="loadMovies('cinema_horror', event)">Ужас</button>
    <button class="genre-btn" onclick="loadMovies('retro_uzbek', event)">Ўзбек Ретро</button>
    <button class="genre-btn" onclick="loadMovies('retro_sssr', event)">СССР Ретро</button>
</div>

<div class="cinema-grid" id="movie-list"></div>

<script>
    function home() {
    window.location.href = "index.html";
}
    const firebaseConfig = {
        apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
        authDomain: "namanganchayhana.firebaseapp.com",
        databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "namanganchayhana",
        storageBucket: "namanganchayhana.firebasestorage.app",
        messagingSenderId: "760810654853",
        appId: "1:760810654853:web:f851116bc7a621e4c52dec"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadMovies(filter, event) {
        const list = document.getElementById('movie-list');
        list.innerHTML = "<p style='text-align:center; width:100%'>Кинолар қидирилмоқда... 🎬</p>";

        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');

        db.ref('posts').once('value', (snapshot) => {
            list.innerHTML = "";
            let found = false;

            snapshot.forEach((category) => {
                // Агар 'all' бўлса ёки категория номи кино жанри бўлса
                if (filter === 'all' || category.key === filter) {
                    if(category.key.startsWith('cinema_') || category.key.startsWith('retro_')) {
                        category.forEach((post) => {
                            const data = post.val();
                            found = true;
                            list.innerHTML += `
                                <div class="video-card">
                                    <div class="video-container">${data.iframe}</div>
                                    <div class="card-info">
                                        <h3>${data.title}</h3>
                                        <p style="font-size:14px; opacity:0.8">${data.text.substring(0, 100)}...</p>
                                    </div>
                                </div>`;
                        });
                    }
                }
            });
            if(!found) list.innerHTML = "<p style='text-align:center; width:100%'>Ҳозирча бу бўлимда кино йўқ.</p>";
        });
    }

    window.onload = () => loadMovies('all');
</script>
</body>
</html>
