<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="vyl3XqkhuQwLPr2tsBQMlogslBRuEPVPKDXfMat-1MM" />
    <title>Universal Radio - Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --bg: #1a1a2e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }

        /* МЕНЮ */
        header { background: var(--dark); padding: 15px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .logo-text { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .main-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; text-decoration: none; padding: 10px 18px; border-radius: 25px; font-size: 14px; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); }

        /* РАДИО ПЛЕЕР */
        .radio-card { 
            max-width: 600px; margin: 50px auto; background: #16213e; padding: 40px; 
            border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .visualizer { 
            width: 100px; height: 100px; background: var(--primary); border-radius: 50%; 
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 40px; box-shadow: 0 0 20px var(--primary);
        }
        .pulse-animation { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        .play-btn { 
            width: 80px; height: 80px; background: white; color: var(--dark); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin: 20px auto; cursor: pointer; font-size: 30px; transition: 0.3s;
        }
        .play-btn:hover { background: var(--primary); color: white; transform: scale(1.1); }
        
        .volume-control { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type=range] { accent-color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">ЧОЙХОНА</div>
    <div class="main-nav">
        <a href="index.html" class="nav-btn">Асосий саҳифа</a>
        <a href="poetry.html" class="nav-btn">Шеърият</a>
        <a href="cooking.html" class="nav-btn">Ширин таомлар</a>
        <a href="health.html" class="nav-btn">Саломатлик</a>
        <a href="radio.html" class="nav-btn active">Онлайн Радио</a>
        <a href="admin.html" class="nav-btn"><i class="fas fa-lock"></i></a>
    </div>
</header>

<div class="radio-card">
    <div class="visualizer" id="viz"><i class="fas fa-microphone-alt"></i></div>
    <h2 style="letter-spacing: 2px;">UNIVERSAL RADIO</h2>
    <p id="status-text" style="color: #94a3b8;">Эфирга уланиш учун PLAY тугмасини босинг</p>
    
    <div class="play-btn" onclick="toggleRadio()">
        <i class="fas fa-play" id="playIcon"></i>
    </div>

    <div class="volume-control">
        <i class="fas fa-volume-down"></i>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
        <i class="fas fa-volume-up"></i>
    </div>
</div>

<script>
    // Сиз берган Zeno.fm линки
    const streamUrl = "https://stream.zeno.fm/x1fku0klopxtv";
    const audio = new Audio(streamUrl);
    let isPlaying = false;

    function toggleRadio() {
        const icon = document.getElementById('playIcon');
        const viz = document.getElementById('viz');
        const status = document.getElementById('status-text');

        if (!isPlaying) {
            status.innerText = "Уланиш...";
            audio.play().then(() => {
                isPlaying = true;
                icon.classList.replace('fa-play', 'fa-pause');
                viz.classList.add('pulse-animation');
                status.innerText = "Ҳозир эфирда: LIVE";
            }).catch(e => {
                alert("Хатолик: Эфир вақтинча тўхтатилган бўлиши мумкин.");
                status.innerText = "Хатолик юз берди";
            });
        } else {
            audio.pause();
            isPlaying = false;
            icon.classList.replace('fa-pause', 'fa-play');
            viz.classList.remove('pulse-animation');
            status.innerText = "Пауза";
        }
    }

    function changeVolume(val) {
        audio.volume = val;
    }
</script>

</body>
</html>
