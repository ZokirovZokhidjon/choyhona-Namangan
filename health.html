<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Саломатлик - Чойхона</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        header { background: var(--dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: white; text-decoration: none; padding: 10px 15px; border-radius: 20px; font-size: 14px; margin: 0 5px; background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--primary); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .card-content { padding: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 700px; border-radius: 20px; position: relative; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="nav-btn">Асосий</a>
    <a href="health.html" class="nav-btn active">Саломатлик</a>
    <a href="poetry.html" class="nav-btn">Шеърият</a>
    <a href="radio.html" class="nav-btn">Радио</a>
</header>

<div class="container">
    <h1 style="text-align: center; color: var(--primary);"><i class="fas fa-heartbeat"></i> Саломатлик бурчаги</h1>
    <div class="health-grid" id="health-feed"></div>
</div>

<div id="hModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="closeH()">&times;</span>
        <div id="hBody"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];

    function loadHealth() {
        const feed = document.getElementById('health-feed');
        const filtered = db.filter(p => p.category === 'health');

        if(filtered.length === 0) {
            feed.innerHTML = "<p>Ҳозирча мақолалар йўқ.</p>";
            return;
        }

        feed.innerHTML = "";
        filtered.reverse().forEach(p => {
            let media = p.video ? 
                `<div style="background:#000; height:200px; display:flex; align-items:center; justify-content:center; color:white;"><i class="fas fa-play-circle fa-3x"></i></div>` : 
                `<img src="${p.image || 'https://via.placeholder.com/400x200'}" style="width:100%; height:200px; object-fit:cover;">`;

            feed.innerHTML += `
                <div class="card" onclick="openH(${db.indexOf(p)})" style="cursor:pointer;">
                    ${media}
                    <div class="card-content">
                        <h3>${p.title}</h3>
                        <p style="font-size:14px; color:#666;">${p.content.substring(0, 100)}...</p>
                    </div>
                </div>`;
        });
    }

    function openH(index) {
        const p = db[index];
        const body = document.getElementById('hBody');
        let media = p.video ? 
            `<div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px;">
                <iframe src="https://www.youtube.com/embed/${p.video}" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" allowfullscreen></iframe>
            </div>` : 
            `<img src="${p.image}" style="width:100%; border-radius:10px; margin-bottom:15px;">`;

        body.innerHTML = `<h2>${p.title}</h2>${media}<p style="margin-top:15px; line-height:1.6; white-space:pre-wrap;">${p.content}</p>`;
        document.getElementById('hModal').style.display = 'block';
    }

    function closeH() { document.getElementById('hModal').style.display = 'none'; }
    window.onload = loadHealth;
</script>
</body>
</html>
