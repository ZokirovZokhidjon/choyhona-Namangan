<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Саломатлик - Чойхона Блоги</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Ruslan+Display&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #1a0f00; --card: #2c1a01; }
        body { background: var(--bg); color: #f4e4bc; font-family: 'Alice', serif; margin: 0; padding: 0; }

        /* ТЕПАДАГИ МЕНЮ - ҚОТИРИЛГАН (STICKY) */
        header { 
            background: var(--card); 
            padding: 15px 0; 
            border-bottom: 2px solid var(--gold); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .nav-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-link { color: #f4e4bc; text-decoration: none; font-weight: bold; padding: 8px 15px; border: 1px solid transparent; transition: 0.3s; border-radius: 20px; font-size: 14px; }
        .nav-link:hover { border-color: var(--gold); color: var(--gold); }
        .active-link { background: var(--gold); color: #1a0f00; }

        /* БЛОГ УСЛУБИДАГИ КОНТЕНТ */
        .blog-container { max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .page-title { font-family: 'Ruslan Display', cursive; text-align: center; color: var(--gold); font-size: 32px; margin-bottom: 40px; }

        .blog-post { 
            background: var(--card); 
            border-radius: 12px; 
            margin-bottom: 40px; 
            overflow: hidden; 
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .blog-post img { width: 100%; max-height: 400px; object-fit: cover; }
        .post-content { padding: 25px; }
        .post-content h2 { font-family: 'Ruslan Display', cursive; color: var(--gold); margin: 0 0 15px 0; font-size: 26px; }
        .post-text { line-height: 1.8; font-size: 18px; color: #f4e4bc; white-space: pre-line; }
        .post-date { font-size: 12px; color: #8a7a50; margin-top: 20px; border-top: 1px solid #3d2602; padding-top: 10px; }

        /* Агар мақола бўлмаса */
        .empty-msg { text-align: center; padding: 50px; font-size: 20px; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="nav-link">Асосий саҳифа</a>
        <a href="health.html" class="nav-link active-link">Саломатлик</a>
        <a href="poetry.html" class="nav-link">Шеърият</a>
        <a href="cockes.html" class="nav-link">Ширин таомлар</a>
        <a href="cinema.html" class="nav-link">Кинотеатр</a>
        <a href="radio.html" class="nav-link">Радио</a>
    </div>
</header>

<div class="blog-container">
    <h1 class="page-title">🌿 САЛОМАТЛИК БЛОГИ</h1>
    <div id="blog-posts">
        <p class="empty-msg">Маълумот юкланмоқда... ⏳</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
        authDomain: "namanganchayhana.firebaseapp.com",
        databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "namanganchayhana",
        storageBucket: "namanganchayhana.firebasestorage.app",
        messagingSenderId: "760810654853",
        appId: "1:760810654853:web:f851116bc7a621e4c52dec"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Мақолаларни чиқариш
    function fetchHealthPosts() {
        const blogBox = document.getElementById('blog-posts');
        
        // ДИҚҚАТ: 'health' категориясини базадан ўқиймиз
        db.ref('posts/health').on('value', (snapshot) => {
            blogBox.innerHTML = "";
            let count = 0;

            snapshot.forEach((child) => {
                count++;
                const data = child.val();
                
                const imgHtml = data.image ? `<img src="${data.image}" alt="rasm">` : "";
                const videoHtml = data.iframe ? `<div style="margin:15px 0;">${data.iframe}</div>` : "";

                blogBox.innerHTML = `
                    <article class="blog-post">
                        ${imgHtml}
                        <div class="post-content">
                            <h2>${data.title}</h2>
                            <div class="post-text">${data.text}</div>
                            ${videoHtml}
                            <div class="post-date">🗓 Юборилган вақт: ${data.time || 'Номаълум'}</div>
                        </div>
                    </article>
                ` + blogBox.innerHTML; 
            });

            if(count === 0) {
                blogBox.innerHTML = "<p class='empty-msg'>Бу бўлимда ҳозирча мақолалар йўқ. <br><br> Админ панелдан 'Саломатлик' бўлимини танлаб мақола юборинг.</p>";
            }
        });
    }

    window.onload = fetchHealthPosts;
</script>

</body>
</html>
