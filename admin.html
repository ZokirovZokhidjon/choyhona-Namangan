<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Бошқарув</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Ruslan+Display&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background: #0f0a00; color: #f4e4bc; font-family: 'Alice', serif; margin: 0; padding: 0; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: #1a1201; padding: 40px; border: 2px solid #007bff; border-radius: 15px; text-align: center; width: 320px; }
        #admin-content { display: none; }
        
        .nav-bar { background: #1a1201; padding: 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-around; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-bar a { color: #007bff; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .editor-box { background: #1a1201; padding: 30px; border-radius: 15px; border: 1px solid #007bff; margin-bottom: 40px; }
        
        h2 { color: #007bff; font-family: 'Ruslan Display', cursive; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #007bff; color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        .btn-blue { background: #007bff; color: #fff; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .btn-blue:hover { background: #0056b3; }
        .btn-danger { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #ffc107; color: black; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-right: 5px; }

        /* Постлар жадвали */
        .post-manager { background: #1a1201; border: 1px solid #007bff; border-radius: 15px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #3d2602; padding: 12px; text-align: left; }
        th { color: #007bff; }
        .cat-badge { background: #3d2602; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:#007bff;">🔒 КИРИШ</h2>
        <input type="password" id="passInput" placeholder="Паролни ёзинг...">
        <button class="btn-blue" style="width:100%" onclick="verify()">КИРИШ</button>
    </div>
</div>

<div id="admin-content">
    <div class="nav-bar">
        <a href="index.html">🏠 САЙТГА ЎТИШ</a>
        <h3 style="margin:0; color:#007bff;">Admin Panel</h3>
        <button onclick="logout()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; cursor:pointer; padding:5px 15px; border-radius:5px;">ЧИҚИШ</button>
    </div>

    <div class="container">
        <div class="editor-box" id="form-section">
            <h2 id="form-title">ЯНГИ МАЪЛУМОТ ЮБОРИШ</h2>
            <input type="hidden" id="edit-id">
            <input type="hidden" id="edit-cat">

            <input type="text" id="title" placeholder="Сарлавҳа...">
            <select id="category">
                <option value="">-- Бўлимни танланг --</option>
                <option value="main">🏠 Асосий саҳифа</option>
                <option value="health">🌿 Саломатлик</option>
                <option value="poetry">📜 Шеърият</option>
                <option value="cockes">🍲 Ширин таомлар</option>
                <optgroup label="🎬 Кинотеатр">
                    <option value="cinema_drama">🎭 Драма</option>
                    <option value="cinema_triller">🔪 Триллер</option>
                    <option value="cinema_komediya">😂 Комедия</option>
                    <option value="cinema_jangari">👊 Боевик</option>
                    <option value="cinema_fantastika">👽 Фантастика</option>
                    <option value="cinema_horror">👻 Ужас</option>
                    <option value="retro_uzbek">🎥 Ўзбек Ретро</option>
                    <option value="retro_sssr">🚩 СССР Ретро</option>
                </optgroup>
            </select>
            <input type="text" id="imgUrl" placeholder="Расм линки...">
            <textarea id="videoIframe" rows="3" placeholder="Embed код (<iframe>)..."></textarea>
            <textarea id="textContent" rows="6" placeholder="Матн..."></textarea>
            
            <button class="btn-blue" id="submitBtn" onclick="saveData()" style="width:100%">🚀 САЙТГА ЮБОРИШ</button>
            <button class="btn-danger" id="cancelBtn" onclick="resetForm()" style="width:100%; margin-top:10px; display:none;">БЕКОР ҚИЛИШ</button>
        </div>

        <div class="post-manager">
            <h2>МАЪЛУМОТЛАРНИ БОШҚАРИШ</h2>
            <table id="postsTable">
                <thead>
                    <tr>
                        <th>Сарлавҳа</th>
                        <th>Бўлим</th>
                        <th>Вақти</th>
                        <th>Амаллар</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const secret = "MTIzNA=="; // Пароль: 1234
    const firebaseConfig = {
        apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
        authDomain: "namanganchayhana.firebaseapp.com",
        databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "namanganchayhana",
        storageBucket: "namanganchayhana.firebasestorage.app",
        messagingSenderId: "760810654853",
        appId: "1:760810654853:web:f851116bc7a621e4c52dec"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verify() {
        if (btoa(document.getElementById('passInput').value) === secret) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadPosts();
        } else { alert("Хато!"); }
    }

    function logout() { location.reload(); }

    // Маълумотни сақлаш (Янги ёки Таҳрирланган)
    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const oldCat = document.getElementById('edit-cat').value;
        const title = document.getElementById('title').value;
        const cat = document.getElementById('category').value;
        const text = document.getElementById('textContent').value;
        const img = document.getElementById('imgUrl').value;
        const iframe = document.getElementById('videoIframe').value;

        if(!title || !cat) return alert("Маълумотни тўлдиринг!");

        const postData = { title, text, category: cat, image: img, iframe, time: new Date().toLocaleString() };

        if(id) {
            // Таҳрирлаш: агар категория ўзгарган бўлса эскисини ўчириб янгисига ёзади
            if(oldCat !== cat) { await db.ref('posts/' + oldCat + '/' + id).remove(); }
            await db.ref('posts/' + cat + '/' + id).set(postData);
        } else {
            // Янги қўшиш
            await db.ref('posts/' + cat).push(postData);
        }
        resetForm();
        loadPosts();
    }

    // Базадаги барча постларни жадвалга чиқариш
    function loadPosts() {
        db.ref('posts').on('value', (snapshot) => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            snapshot.forEach((category) => {
                category.forEach((post) => {
                    const data = post.val();
                    const key = post.key;
                    tbody.innerHTML += `
                        <tr>
                            <td>${data.title}</td>
                            <td><span class="cat-badge">${category.key}</span></td>
                            <td style="font-size:12px;">${data.time}</td>
                            <td>
                                <button class="btn-edit" onclick="editPost('${key}', '${category.key}')">✎</button>
                                <button class="btn-danger" onclick="deletePost('${key}', '${category.key}')">🗑</button>
                            </td>
                        </tr>`;
                });
            });
        });
    }

    // Ўчириш
    async function deletePost(id, cat) {
        if(confirm("Ростан ҳам ўчирмоқчимисиз?")) {
            await db.ref('posts/' + cat + '/' + id).remove();
        }
    }

    // Таҳрирлаш учун формага юклаш
    function editPost(id, cat) {
        db.ref('posts/' + cat + '/' + id).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-cat').value = cat;
            document.getElementById('title').value = data.title;
            document.getElementById('category').value = cat;
            document.getElementById('textContent').value = data.text;
            document.getElementById('imgUrl').value = data.image;
            document.getElementById('videoIframe').value = data.iframe;
            
            document.getElementById('form-title').innerText = "ТАҲРИРЛАШ РЕЖИМИ";
            document.getElementById('submitBtn').innerText = "✅ ЎЗГАРИШНИ САҚЛАШ";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo(0,0);
        });
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('edit-cat').value = "";
        document.getElementById('title').value = "";
        document.getElementById('textContent').value = "";
        document.getElementById('imgUrl').value = "";
        document.getElementById('videoIframe').value = "";
        document.getElementById('form-title').innerText = "ЯНГИ МАЪЛУМОТ ЮБОРИШ";
        document.getElementById('submitBtn').innerText = "🚀 САЙТГА ЮБОРИШ";
        document.getElementById('cancelBtn').style.display = "none";
    }
</script>
</body>
</html>
