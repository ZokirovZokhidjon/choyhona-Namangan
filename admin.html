<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона - Админ Панел</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        /* Login Ойнаси */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box input { display: block; width: 250px; margin: 10px auto; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Админ Панел Дизайни */
        #admin-wrapper { display: none; max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 200px; resize: vertical; }
        
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-save:hover { background: #219150; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; }

        #preview-img { max-width: 200px; margin-top: 10px; border-radius: 8px; display: none; border: 2px solid #ddd; }
        #status { color: #d35400; font-weight: bold; display: none; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>Чойхона Админ</h2>
        <input type="text" id="u_name" placeholder="Логин">
        <input type="password" id="u_pass" placeholder="Парол">
        <button onclick="checkAuth()">КИРИШ</button>
    </div>
</div>

<div id="admin-wrapper">
    <button class="logout-btn" onclick="logout()">Чиқиш</button>
    <h2>Янги пост қўшиш</h2>
    
    <div class="form-group">
        <label>Сарлавҳа</label>
        <input type="text" id="p-title" placeholder="Мақола ёки фильм номи...">
    </div>

    <div class="form-group">
        <label>Категория (Бўлим)</label>
        <select id="p-cat">
            <option value="news">Янгиликлар</option>
            <option value="poetry">Шеърият</option>
            <option value="classic">Мумтоз наволар</option>
            <option value="cooking">Ширин таомлар</option>
            <option value="health">Саломатлик</option>
            <option value="detective">Кино: Детектив</option>
            <option value="drama">Кино: Драма</option>
            <option value="horror">Кино: Қўрқинчли</option>
            <option value="fishing">Кино: Балиқ ови</option>
        </select>
    </div>

    <div class="form-group">
        <label>Расм юклаш (ImgBB орқали)</label>
        <input type="file" accept="image/*" onchange="uploadImage(this)">
        <input type="hidden" id="p-img">
        <div id="status">Расм юкланмоқда...</div>
        <img id="preview-img">
    </div>

    <div class="form-group">
        <label>YouTube Видео ID (Масалан: dQw4w9WgXcQ ёки тўлиқ линк)</label>
        <input type="text" id="p-video" placeholder="Агар видео бўлса линкни қўйинг">
    </div>

    <div class="form-group">
        <label>Матн (Шеър бўлса қатор ташлаб ёзинг)</label>
        <textarea id="p-text" placeholder="Мақола матни ёки шеър..."></textarea>
    </div>

    <button class="btn-save" onclick="savePost()">ПОСТНИ САҚЛАШ</button>
</div>

<script>
    const IMGBB_KEY = "6f5298966779426f83f2081d0f5c1d76";

    // Авторизация
    function checkAuth() {
        const u = document.getElementById('u_name').value;
        const p = document.getElementById('u_pass').value;
        // Логин: admin, Парол: 7528 (base64 қилинган)
        if(btoa(u) === "YWRtaW4=" && btoa(p) === "NzUyOA==") {
            sessionStorage.setItem('choyhona_admin', 'true');
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'block';
        } else {
            alert("Логин ёки парол хато!");
        }
    }

    // Расм юклаш функцияси
    async function uploadImage(input) {
        const file = input.files[0];
        if(!file) return;
        
        document.getElementById('status').style.display = 'block';
        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            if(data.success) {
                document.getElementById('p-img').value = data.data.url;
                document.getElementById('preview-img').src = data.data.url;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('status').innerText = "Расм муваффақиятли юкланди!";
            }
        } catch (error) {
            alert("Расм юклашда хатолик!");
        }
    }

    // Постни сақлаш
    function savePost() {
        const title = document.getElementById('p-title').value;
        const text = document.getElementById('p-text').value;
        const cat = document.getElementById('p-cat').value;
        const videoInput = document.getElementById('p-video').value;
        const img = document.getElementById('p-img').value;

        if(!title || !text) {
            alert("Сарлавҳа ва матнни киритинг!");
            return;
        }

        // YouTube ID ни ажратиб олиш
        let vId = "";
        if(videoInput) {
            if(videoInput.includes('v=')) vId = videoInput.split('v=')[1].split('&')[0];
            else if(videoInput.includes('be/')) vId = videoInput.split('be/')[1].split('?')[0];
            else vId = videoInput;
        }

        let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        
        const newPost = {
            title: title,
            content: text,
            category: cat,
            image: img,
            video: vId,
            type: vId ? 'video' : 'article',
            date: new Date().toLocaleString(),
            views: 0
        };

        db.push(newPost);
        localStorage.setItem('choyhona_posts', JSON.stringify(db));
        
        alert("Пост муваффақиятли қўшилди!");
        location.reload(); // Саҳифани янгилаш
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // Саҳифа юкланганда текшириш
    window.onload = () => {
        if(sessionStorage.getItem('choyhona_admin')) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'block';
        }
    }
</script>

</body>
</html>
