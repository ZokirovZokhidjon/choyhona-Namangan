<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чойхона - Mobile Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d4ff; --orange: #ff6a00; --bg: #0f172a; --card: #1e293b; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: white; margin: 0; padding: 0;
        }

        /* Шапка */
        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 15px 20px; border-bottom: 2px solid var(--blue);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }

        .container { padding: 15px; max-width: 1000px; margin: 0 auto; }

        /* Форма блоки */
        .glass-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 { font-size: 18px; color: var(--blue); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        label { display: block; font-size: 12px; color: #94a3b8; margin: 10px 0 5px 5px; }

        input, select, textarea {
            width: 100%; padding: 14px; border-radius: 12px;
            background: #0f172a; border: 1px solid #334155; color: white;
            font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        .btn-submit {
            width: 100%; padding: 16px; background: linear-gradient(45deg, var(--blue), #0055ff);
            border: none; border-radius: 12px; color: white; font-weight: bold;
            font-size: 16px; margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }

        /* Рўйхат (Мобил учун қулай) */
        .post-list-item {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .post-info b { font-size: 14px; display: block; color: var(--text); }
        .post-info span { font-size: 11px; color: var(--orange); text-transform: uppercase; }

        .btn-delete {
            background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c;
            padding: 10px; border-radius: 10px; cursor: pointer;
        }

        /* Логин ойнаси - Мобил учун */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            padding: 20px;
        }
        .login-box {
            width: 100%; max-width: 350px; text-align: center;
        }

        @media (max-width: 600px) {
            header h3 { font-size: 16px; }
            .btn-submit { padding: 18px; } /* Бармоқ тегиши осон бўлиши учун */
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-rocket fa-3x" style="color: var(--orange); margin-bottom: 20px;"></i>
        <h2>COMMAND CENTER</h2>
        <input type="text" id="u" placeholder="Логин" style="margin-bottom: 10px;">
        <input type="password" id="p" placeholder="Пароль">
        <button class="btn-submit" onclick="auth()">КИРИШ</button>
    </div>
</div>

<div id="admin-content" style="display: none;">
    <header>
        <h3 style="margin:0;"><i class="fas fa-handshake"></i> ЧОЙХОНА АДМИН</h3>
        <button onclick="logout()" style="background:none; border:none; color:#e74c3c;"><i class="fas fa-sign-out-alt fa-lg"></i></button>
    </header>

    <div class="container">
        <div class="glass-card">
            <h2><i class="fas fa-pen-nib"></i> Янги хабар юбориш</h2>
            
            <label>Сарлавҳа</label>
            <input type="text" id="title" placeholder="Мавзу...">

            <label>Қайси саҳифага юборамиз?</label>
            <select id="cat">
                <option value="main">🏠 Асосий саҳифа</option>
                <option value="news">📰 Янгиликлар</option>
                <option value="cooking">🍲 Ширин таомлар</option>
                <option value="action">🔥 Кино: Боевик</option>
                <option value="detective">🕵️ Кино: Детектив</option>
                <option value="poetry">✍️ Шеърият</option>
                <option value="fishing">🎣 Балиқ ови</option>
                <option value="health">🩺 Саломатлик</option>
            </select>

            <label>YouTube ID (Агар видео бўлса)</label>
            <input type="text" id="vid" placeholder="Масалан: dQw4w9WgXcQ">

            <label>Расм линки (ImgBB ёки бошқа)</label>
            <input type="text" id="img" placeholder="https://...">

            <label>Хабар матни</label>
            <textarea id="text" rows="5" placeholder="Бу ерга ёзинг..."></textarea>

            <button class="btn-submit" onclick="send()">ТИЗИМГА ЖОЙЛАШ</button>
        </div>

        <div class="glass-card">
            <h2><i class="fas fa-list"></i> Юборилганлар</h2>
            <div id="list"></div>
        </div>
    </div>
</div>

<script>
    function auth() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        if(u === 'admin' && p === '7528') {
            sessionStorage.setItem('isLogged', 'true');
            showAdmin();
        } else { alert('Хато!'); }
    }

    function showAdmin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadList();
    }

    function send() {
        const title = document.getElementById('title').value;
        const text = document.getElementById('text').value;
        if(!title || !text) return alert('Тўлдиринг!');

        const db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const newPost = {
            id: Date.now(),
            title: title,
            content: text,
            category: document.getElementById('cat').value,
            video: document.getElementById('vid').value,
            image: document.getElementById('img').value,
            date: new Date().toLocaleString()
        };

        db.push(newPost);
        localStorage.setItem('choyhona_posts', JSON.stringify(db));
        alert('Муваффақиятли юборилди!');
        location.reload();
    }

    function loadList() {
        const list = document.getElementById('list');
        const db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        list.innerHTML = db.length ? "" : "<p style='color:#666; text-align:center;'>Ҳеч нарса йўқ</p>";
        
        db.slice().reverse().forEach((item, index) => {
            list.innerHTML += `
                <div class="post-list-item">
                    <div class="post-info">
                        <b>${item.title.substring(0, 25)}...</b>
                        <span><i class="fas fa-tag"></i> ${item.category}</span>
                    </div>
                    <button class="btn-delete" onclick="del(${db.length - 1 - index})"><i class="fas fa-trash"></i></button>
                </div>`;
        });
    }

    function del(i) {
        if(confirm('Ўчирамизми?')) {
            const db = JSON.parse(localStorage.getItem('choyhona_posts'));
            db.splice(i, 1);
            localStorage.setItem('choyhona_posts', JSON.stringify(db));
            loadList();
        }
    }

    function logout() { sessionStorage.clear(); location.reload(); }

    window.onload = () => {
        if(sessionStorage.getItem('isLogged')) showAdmin();
    }
</script>
</body>
</html>
