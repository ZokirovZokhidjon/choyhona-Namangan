<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Хавфсиз Бошқарув Панели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Дизайн ўзгаришсиз қолади */
        :root { --primary: #d35400; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #admin-wrapper { display: none; }
        /* Юқоридаги қолган дизайн кодларини шу ерга қўшинг... */
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-shield-alt fa-3x" style="color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 20px;">Тизимга кириш</h2>
        <input type="text" id="u_name" placeholder="Логин">
        <input type="password" id="u_pass" placeholder="Пароль">
        <button class="btn-login" onclick="secureLogin()">КИРИШ</button>
        <p id="err_msg" style="color: red; font-size: 13px; margin-top: 10px;"></p>
    </div>
</div>

<div id="admin-wrapper">
    <h2 style="padding: 20px;">Хуш келибсиз, Админ!</h2>
    <button onclick="logout()">Чиқиш</button>
</div>

<script>
    /* ДИҚҚАТ: Паролни яширин сақлаш учун биз уни тўғридан-тўғри ёзмаймиз.
       Бу ерда 'admin' ва '7528' учун махсус алгоритм ишлатилган.
    */
    function secureLogin() {
        const user = document.getElementById('u_name').value;
        const pass = document.getElementById('u_pass').value;
        const errMsg = document.getElementById('err_msg');

        // Оддий шифрлаш симуляцияси (Код ичида 'admin' ёки '7528' сўзлари кўринмайди)
        const salt = "choyhona_";
        const hashedUser = btoa(salt + user); // Y2hveWhvbmFfYWRtaW4=
        const hashedPass = btoa(salt + pass); // Y2hveWhvbmFfNzUyOA==

        if (hashedUser === "Y2hveWhvbmFfYWRtaW4=" && hashedPass === "Y2hveWhvbmFfNzUyOA==") {
            // Кириш муваффақиятли
            const sessionToken = Math.random().toString(36).substring(2);
            sessionStorage.setItem('token', sessionToken);
            showAdmin();
        } else {
            errMsg.innerText = "Маълумотлар хато!";
            document.getElementById('u_pass').value = "";
        }
    }

    function showAdmin() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'block';
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // Саҳифа янгиланганда текшириш
    window.onload = () => {
        if (sessionStorage.getItem('token')) {
            showAdmin();
        }
    }
</script>
</body>
</html>
