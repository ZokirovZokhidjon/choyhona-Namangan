<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона Админ - Хавфсиз Бошқарув</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }

        /* 1. ЛОГИН КАРТОЧКАСИ */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; 
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; width: 340px; 
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        .login-card i { color: var(--primary); margin-bottom: 20px; display: block; }
        .login-card h2 { margin-bottom: 25px; color: var(--dark); text-transform: uppercase; letter-spacing: 1px; }
        .login-card input { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(211, 84, 0, 0.2); }
        .btn-enter { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;
        }
        .btn-enter:active { transform: scale(0.98); }
        .btn-home { 
            display: inline-block; margin-top: 25px; color: #7f8c8d; 
            text-decoration: none; font-size: 14px; transition: 0.3s;
        }
        .btn-home:hover { color: var(--primary); }

        /* 2. АДМИН ХОНАСИ ИЧКИ ДИЗАЙНИ */
        #admin-wrapper { display: none; }
        
        .sidebar { width: 260px; background: var(--dark); height: 100vh; color: white; position: fixed; }
        .sidebar h2 { color: var(--primary); padding: 25px; text-align: center; border-bottom: 1px solid #34495e; margin: 0; font-size: 22px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: var(--primary); }

        .main-content { margin-left: 260px; padding: 40px; }
        .section { display: none; }
        .active-section { display: block; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 6px solid var(--primary); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--dark); }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        table th { background: #eee; padding: 15px; text-align: left; }
        table td { padding: 15px; border-bottom: 1px solid #eee; }
        .action-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; color: white; margin-right: 5px; transition: 0.2s; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-4x"></i>
        <h2>Админ кириш</h2>
        <input type="text" id="user_in" placeholder="Логин">
        <input type="password" id="pass_in" placeholder="Махфий код">
        <button class="btn-enter" onclick="checkAuth()">КИРИШ</button>
        <a href="index.html" class="btn-home"><i class="fas fa-arrow-left"></i> Асосий саҳифага қайтиш</a>
        <p id="error" style="color:red; font-size:13px; margin-top:15px; font-weight:bold;"></p>
    </div>
</div>

<div id="admin-wrapper">
    <div class="sidebar">
        <h2>ЧОЙХОНА АДМИН</h2>
        <ul class="sidebar-menu">
            <li class="active" onclick="tab('stats')"><i class="fas fa-chart-line"></i> Статистика</li>
            <li onclick="tab('add')"><i class="fas fa-plus-circle"></i> Янги хабар қўшиш</li>
            <li onclick="tab('manage')"><i class="fas fa-tasks"></i> Хабарларни бошқариш</li>
            <li onclick="logout()" style="color: #fab1a0;"><i class="fas fa-power-off"></i> Чиқиш</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="stats" class="section active-section">
            <h1>Тизим статистикаси</h1>
            <div class="stats-grid" id="stat-view"></div>
        </div>

        <div id="add" class="section">
            <h1 id="f-title">Янги мақола юбориш</h1>
            <div class="card">
                <input type="hidden" id="edit-id" value="-1">
                
                <div class="form-group">
                    <label>Қайси бўлимга юборамиз?</label>
                    <select id="p-cat">
                        <option value="news">Асосий саҳифа (Янгиликлар)</option>
                        <option value="cooking">Ширин таомлар (cockes.html)</option>
                        <option value="health">Тиббиёт / Саломатлик</option>
                        <option value="poetry">Шеърият дунёси</option>
                        <option value="psy">Психология (Радио саҳифасига)</option>
                        <option value="astro">Астрология (Радио саҳифасига)</option>
                        <option value="story">Ҳикоялар (Радио саҳифасига)</option>
                        <option value="story">Мақолалар (Радио саҳифасига)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>YouTube Видео ID (Масалан: dQw4w9WgXcQ)</label>
                    <input type="text" id="p-video" placeholder="Видео кодини киритинг...">
                </div>

                <div class="form-group">
                    <label>Расм линки (URL)</label>
                    <input type="text" id="p-img" placeholder="https://example.com/rasm.jpg">
                </div>

                <div class="form-group">
                    <label>Сарлавҳа</label>
                    <input type="text" id="p-title" placeholder="Мақола номи...">
                </div>

                <div class="form-group">
                    <label>Мақола матни</label>
                    <textarea id="p-text" rows="8" placeholder="Батафсил ёзинг..."></textarea>
                </div>

                <button class="btn-enter" onclick="save()">САҚЛАШ ВА ЮБОРИШ</button>
            </div>
        </div>

        <div id="manage" class="section">
            <h1>Мақолаларни бошқариш</h1>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Сарлавҳа</th>
                            <th>Бўлим</th>
                            <th>Амал</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const _HASH = "NzUyOA=="; // 7528

    function checkAuth() {
        const u = document.getElementById('user_in').value;
        const p = document.getElementById('pass_in').value;
        if(u === 'admin' && btoa(p) === _HASH) {
            sessionStorage.setItem('adminStatus', 'authorized');
            openAdmin();
        } else {
            document.getElementById('error').innerText = "Хато: Кириш тақиқланди!";
        }
    }

    function openAdmin() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'block';
        updateStats();
    }

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(id === 'manage') loadTable();
        
        // "Янги қўшиш"га қайтганда формани тозалаш
        if(id === 'add' && document.getElementById('edit-id').value === "-1") {
            clearForm();
        }
    }

    function clearForm() {
        document.getElementById('p-title').value = "";
        document.getElementById('p-text').value = "";
        document.getElementById('p-video').value = "";
        document.getElementById('p-img').value = "";
        document.getElementById('edit-id').value = "-1";
        document.getElementById('f-title').innerText = "Янги мақола юбориш";
    }

    function save() {
        const title = document.getElementById('p-title').value;
        const text = document.getElementById('p-text').value;
        const cat = document.getElementById('p-cat').value;
        const video = document.getElementById('p-video').value;
        const image = document.getElementById('p-img').value;
        const editId = document.getElementById('edit-id').value;

        if(!title || !text) return alert("Сарлавҳа ва матнни тўлдиринг!");

        let posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const postData = { 
            title, 
            content: text, 
            category: cat, 
            video: video, 
            image: image,
            date: new Date().toLocaleString() 
        };

        if(editId === "-1") {
            posts.push(postData);
        } else {
            posts[editId] = postData;
        }

        localStorage.setItem('choyhona_posts', JSON.stringify(posts));
        alert("Мақола сақланди!");
        clearForm();
        tab('manage');
        updateStats();
    }

    function loadTable() {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const body = document.getElementById('list-body');
        body.innerHTML = "";
        posts.forEach((p, i) => {
            body.innerHTML += `<tr>
                <td><b>${p.title}</b></td>
                <td><span style="color:var(--primary)">${p.category}</span></td>
                <td>
                    <button class="action-btn" style="background:var(--success)" onclick="edit(${i})"><i class="fas fa-edit"></i></button>
                    <button class="action-btn" style="background:var(--danger)" onclick="del(${i})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    function edit(i) {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts'));
        const p = posts[i];
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-text').value = p.content;
        document.getElementById('p-cat').value = p.category;
        document.getElementById('p-video').value = p.video || "";
        document.getElementById('p-img').value = p.image || "";
        document.getElementById('edit-id').value = i;
        document.getElementById('f-title').innerText = "Мақолани таҳрирлаш";
        tab('add');
    }

    function del(i) {
        if(confirm("Ўчирилсинми?")) {
            let posts = JSON.parse(localStorage.getItem('choyhona_posts'));
            posts.splice(i, 1);
            localStorage.setItem('choyhona_posts', JSON.stringify(posts));
            loadTable();
            updateStats();
        }
    }

    function updateStats() {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        document.getElementById('stat-view').innerHTML = `
            <div class="stat-card"><i class="fas fa-file-alt"></i><h3>Жами</h3><h2>${posts.length}</h2></div>
            <div class="stat-card"><i class="fas fa-utensils"></i><h3>Таомлар</h3><h2>${posts.filter(p=>p.category==='cooking').length}</h2></div>
            <div class="stat-card"><i class="fas fa-brain"></i><h3>Руҳият</h3><h2>${posts.filter(p=>['psy','astro','story'].includes(p.category)).length}</h2></div>
            <div class="stat-card"><i class="fas fa-heart"></i><h3>Тиббиёт</h3><h2>${posts.filter(p=>p.category==='health').length}</h2></div>
        `;
    }

    function logout() { sessionStorage.clear(); location.reload(); }

    window.onload = () => { if(sessionStorage.getItem('adminStatus') === 'authorized') openAdmin(); }
</script>

</body>
</html>
