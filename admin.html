<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чойхона - Cosmic Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-orange: #ff6a00; 
            --dark: #0f172a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000; color: white; margin: 0; padding: 10px;
        }

        /* Ракета анимацияси */
        .rocket-box {
            text-align: center; padding: 20px 0;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .rocket-logo { font-size: 50px; color: var(--neon-orange); filter: drop-shadow(0 0 15px var(--neon-orange)); }

        /* Контейнер */
        .glass-box {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--neon-blue);
            border-radius: 20px; padding: 20px;
            margin-bottom: 20px; backdrop-filter: blur(10px);
        }

        h2 { font-size: 18px; color: var(--neon-blue); text-transform: uppercase; text-align: center; }

        input, select, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
            background: #000; border: 1px solid #334155; color: white;
            font-size: 16px; box-sizing: border-box; outline: none;
        }

        .btn-save {
            width: 100%; padding: 15px; background: linear-gradient(45deg, var(--neon-blue), #0055ff);
            border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px;
            margin-top: 10px; cursor: pointer; text-transform: uppercase;
        }

        /* Постлар рўйхати мобилда */
        .post-card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            margin-bottom: 10px; border-left: 4px solid var(--neon-orange);
            display: flex; justify-content: space-between; align-items: center;
        }
        .post-info b { font-size: 14px; display: block; margin-bottom: 5px; }
        .post-info span { font-size: 12px; color: #888; }

        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 8px; }

        #upload-status { font-size: 12px; color: #39ff14; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="rocket-box">
        <i class="fas fa-rocket rocket-logo"></i>
        <div style="font-size: 12px; letter-spacing: 3px; margin-top: 10px;">COMMAND CENTER</div>
    </div>

    <div class="glass-box">
        <h2>Янги Пост</h2>
        
        <input type="text" id="p-title" placeholder="Сарлавҳа...">
        
        <select id="p-cat">
            <option value="main">🏠 Асосий саҳифа</option>
            <option value="news">📰 Янгиликлар</option>
            <option value="detective">🕵️ Кино: Детектив</option>
            <option value="poetry">✍️ Шеърият</option>
            <option value="fishing">🎣 Балиқ ови</option>
        </select>

        <input type="text" id="p-video" placeholder="YouTube Video ID">
        
        <input type="file" id="file-input" onchange="uploadImg(this)" style="font-size: 12px;">
        <input type="hidden" id="p-img">
        <div id="upload-status" style="display:none;">Юкланмоқда...</div>

        <textarea id="p-text" rows="4" placeholder="Матнни ёзинг..."></textarea>

        <button class="btn-save" onclick="savePost()">САҚЛАШ</button>
    </div>

    <div class="glass-box">
        <h2>Маълумотлар</h2>
        <div id="posts-list"></div>
    </div>

    <div style="text-align: center; padding-bottom: 30px;">
        <a href="index.html" style="color: #64748b; text-decoration: none;">← Сайтга қайтиш</a>
    </div>

<script>
    const IMGBB_KEY = "6f5298966779426f83f2081d0f5c1d76";
    let db = JSON.parse(localStorage.getItem('choyhona_posts')) || [];

    async function uploadImg(input) {
        if(!input.files[0]) return;
        const status = document.getElementById('upload-status');
        status.style.display = 'block';
        status.innerHTML = "Юкланмоқда...";

        const formData = new FormData();
        formData.append("image", input.files[0]);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            if(data.success) {
                document.getElementById('p-img').value = data.data.url;
                status.innerHTML = "✅ Расм юкланди!";
            }
        } catch (e) { status.innerHTML = "❌ Хато!"; }
    }

    function savePost() {
        const title = document.getElementById('p-title').value;
        const text = document.getElementById('p-text').value;
        if(!title || !text) { alert("Тўлдиринг!"); return; }

        const post = {
            title: title,
            content: text,
            category: document.getElementById('p-cat').value,
            video: document.getElementById('p-video').value,
            image: document.getElementById('p-img').value,
            date: new Date().toLocaleString(),
            views: 0
        };

        db.push(post);
        localStorage.setItem('choyhona_posts', JSON.stringify(db));
        alert("Сақланди!");
        location.reload();
    }

    function renderList() {
        const list = document.getElementById('posts-list');
        list.innerHTML = db.length === 0 ? "<p style='text-align:center'>Пост йўқ</p>" : "";
        db.forEach((p, i) => {
            list.innerHTML += `
                <div class="post-card">
                    <div class="post-info">
                        <b>${p.title.substring(0, 20)}...</b>
                        <span>${p.category}</span>
                    </div>
                    <button class="btn-del" onclick="deletePost(${i})"><i class="fa fa-trash"></i></button>
                </div>`;
        });
    }

    function deletePost(i) {
        if(confirm("Ўчирамизми?")) {
            db.splice(i, 1);
            localStorage.setItem('choyhona_posts', JSON.stringify(db));
            renderList();
        }
    }

    window.onload = renderList;
</script>
</body>
</html>
