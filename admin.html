<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чойхона Админ - Бошқарув</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #admin-wrapper { display: none; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; color: white; position: fixed; }
        .sidebar h2 { color: var(--primary); padding: 20px; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: var(--primary); }
        .main-content { margin-left: 260px; padding: 40px; }
        .section { display: none; }
        .active-section { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-enter { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .upload-area { border: 2px dashed var(--primary); padding: 20px; text-align: center; border-radius: 10px; background: #fff5f0; cursor: pointer; }
        #img-preview { max-width: 100%; height: 150px; margin-top: 10px; display: none; border-radius: 8px; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table th, table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .action-btn { border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x" style="color:var(--primary)"></i>
        <h2>Кириш</h2>
        <input type="text" id="user_in" placeholder="Логин">
        <input type="password" id="pass_in" placeholder="Пароль">
        <button class="btn-enter" onclick="checkAuth()">КИРИШ</button>
        <p id="error" style="color:red; font-size:12px;"></p>
    </div>
</div>

<div id="admin-wrapper">
    <div class="sidebar">
        <h2>CHOYHONA</h2>
        <ul class="sidebar-menu">
            <li id="tab-add" class="active" onclick="tab('add')">Янги қўшиш</li>
            <li id="tab-manage" onclick="tab('manage')">Бошқариш</li>
            <li onclick="logout()">Чиқиш</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="add" class="section active-section">
            <h1 id="f-title">Янги мақола</h1>
            <div class="card">
                <input type="hidden" id="edit-id" value="-1">
                <div class="form-group">
                    <label>Категория:</label>
                    <select id="p-cat">
                        <option value="news">Янгиликлар</option>
                        <option value="cooking">Ширин таомлар</option>
                        <option value="poetry">Шеърият</option>
                        <option value="classic">Мумтоз наволар</option>
                        <option value="health">Саломатлик</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>YouTube Link:</label>
                    <input type="text" id="p-video" placeholder="https://youtube.com/watch?v=...">
                </div>
                <div class="form-group">
                    <label>Расм:</label>
                    <div class="upload-area" onclick="document.getElementById('file-input').click()">
                        <i class="fas fa-cloud-upload-alt"></i> Расм танлаш
                        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadImage(this)">
                    </div>
                    <input type="text" id="p-img" placeholder="Расм линки..." style="margin-top:10px">
                    <img id="img-preview">
                </div>
                <div class="form-group">
                    <label>Сарлавҳа:</label>
                    <input type="text" id="p-title">
                </div>
                <div class="form-group">
                    <label>Матн:</label>
                    <textarea id="p-text" rows="5"></textarea>
                </div>
                <button class="btn-enter" onclick="save()">САҚЛАШ</button>
            </div>
        </div>

        <div id="manage" class="section">
            <h1>Рўйхат</h1>
            <div class="card">
                <table>
                    <thead><tr><th>Сарлавҳа</th><th>Тур</th><th>Амал</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const _HASH = "NzUyOA=="; 
    const IMGBB_KEY = "6f5298966779426f83f2081d0f5c1d76";

    function checkAuth() {
        if (btoa(document.getElementById('pass_in').value) === _HASH) {
            sessionStorage.setItem('admin', 'ok');
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'block';
        } else { alert("Хато!"); }
    }

    async function uploadImage(input) {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("image", file);
        
        document.getElementById('p-img').value = "Юкланмоқда...";
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('p-img').value = data.data.url;
                document.getElementById('img-preview').src = data.data.url;
                document.getElementById('img-preview').style.display = "block";
            }
        } catch (e) { alert("Юклашда хато!"); }
    }

    function save() {
        let posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const editId = document.getElementById('edit-id').value;
        
        let videoUrl = document.getElementById('p-video').value;
        let videoId = "";
        if(videoUrl.includes("v=")) videoId = videoUrl.split("v=")[1].split("&")[0];
        else if(videoUrl.includes("be/")) videoId = videoUrl.split("be/")[1];

        const data = {
            title: document.getElementById('p-title').value,
            content: document.getElementById('p-text').value,
            category: document.getElementById('p-cat').value,
            image: document.getElementById('p-img').value,
            video: videoId,
            date: new Date().toLocaleDateString(),
            views: editId === "-1" ? 0 : posts[editId].views
        };

        if(editId === "-1") posts.push(data);
        else posts[editId] = data;

        localStorage.setItem('choyhona_posts', JSON.stringify(posts));
        alert("Сақланди!");
        location.reload();
    }

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        if(id === 'manage') {
            const posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
            document.getElementById('list-body').innerHTML = posts.map((p, i) => `
                <tr>
                    <td>${p.title}</td>
                    <td>${p.category}</td>
                    <td>
                        <button class="action-btn" style="background:green" onclick="editPost(${i})">✏️</button>
                        <button class="action-btn" style="background:red" onclick="delPost(${i})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
    }

    function delPost(i) {
        let posts = JSON.parse(localStorage.getItem('choyhona_posts'));
        posts.splice(i, 1);
        localStorage.setItem('choyhona_posts', JSON.stringify(posts));
        tab('manage');
    }

    function editPost(i) {
        let p = JSON.parse(localStorage.getItem('choyhona_posts'))[i];
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-text').value = p.content;
        document.getElementById('p-cat').value = p.category;
        document.getElementById('p-img').value = p.image;
        document.getElementById('edit-id').value = i;
        tab('add');
    }

    function logout() { sessionStorage.clear(); location.reload(); }
    window.onload = () => { if(sessionStorage.getItem('admin')) { 
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'block';
    }};
</script>
</body>
</html>
