<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="lf0h1OWqEzgE9H9Y4Kmp4Ij-EJRjDyLsZtpH0H87ihs" />
    <title>Чойхона Админ - Хавфсиз Бошқарув</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        
        /* ЛОГИН КАРТОЧКАСИ */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 340px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .login-card i { color: var(--primary); margin-bottom: 20px; display: block; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-enter { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* АДМИН ХОНАСИ */
        #admin-wrapper { display: none; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; color: white; position: fixed; }
        .sidebar h2 { color: var(--primary); padding: 25px; text-align: center; border-bottom: 1px solid #34495e; margin: 0; }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: var(--primary); }
        
        .main-content { margin-left: 260px; padding: 40px; }
        .section { display: none; }
        .active-section { display: block; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 6px solid var(--primary); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        table th, table td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .action-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; color: white; margin-right: 5px; }
        
        /* Расм юклаш учун қўшимча стил */
        .upload-area { border: 2px dashed #ddd; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; background: #fafafa; }
        #img-preview { max-width: 100px; margin-top: 10px; display: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-4x"></i>
        <h2>Админ кириш</h2>
        <input type="text" id="user_in" placeholder="Логин">
        <input type="password" id="pass_in" placeholder="Махфий код">
        <button class="btn-enter" onclick="checkAuth()">КИРИШ</button>
        <a href="index.html" style="display:block; margin-top:20px; color:#777; text-decoration:none;">Ортга қайтиш</a>
        <p id="error" style="color:red; font-size:13px; margin-top:15px;"></p>
    </div>
</div>

<div id="admin-wrapper">
    <div class="sidebar">
        <h2>АДМИН</h2>
        <ul class="sidebar-menu">
            <li id="tab-stats" class="active" onclick="tab('stats')"><i class="fas fa-chart-line"></i> Статистика</li>
            <li id="tab-add" onclick="tab('add')"><i class="fas fa-plus-circle"></i> Қўшиш</li>
            <li id="tab-manage" onclick="tab('manage')"><i class="fas fa-tasks"></i> Бошқариш</li>
            <li onclick="logout()"><i class="fas fa-power-off"></i> Чиқиш</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="stats" class="section active-section">
            <h1>Тизим ҳолати</h1>
            <div class="stats-grid" id="stat-view"></div>
        </div>

        <div id="add" class="section">
            <h1 id="f-title">Янги мақола</h1>
            <div class="card">
                <input type="hidden" id="edit-id" value="-1">
                
                <div class="form-group">
                    <label>Бўлимни танланг:</label>
                    <select id="p-cat">
                        <option value="news">Асосий саҳифа (Янгиликлар)</option>
                        <option value="cooking">Ширин таомлар</option>
                        <option value="health">Саломатлик</option>
                        <option value="poetry">Шеърият</option>
                        <option value="classic">Мумтоз наволар (Видеолар)</option>
                        <option value="psy">Психология (Радио)</option>
                        <option value="story">Ҳикоялар / Мақолалар</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Video Link (YouTube ёки Facebook)</label>
                    <input type="text" id="p-video" placeholder="https://...">
                    <small style="color:#666">YouTube ёки Facebook видео линкини қўйинг</small>
                </div>

                <div class="form-group">
                    <label>Расм юклаш (Файл танланг ёки URL қўйинг)</label>
                    <div class="upload-area" onclick="document.getElementById('file-input').click()">
                        <i class="fas fa-cloud-upload-alt"></i> Компьютердан танлаш
                        <input type="file" id="file-input" style="display:none" onchange="uploadImage(this)">
                    </div>
                    <input type="text" id="p-img" placeholder="https://site.uz/rasm.jpg" style="margin-top:10px">
                    <img id="img-preview" src="">
                </div>

                <div class="form-group">
                    <label>Сарлавҳа</label>
                    <input type="text" id="p-title">
                </div>

                <div class="form-group">
                    <label>Матн (HTML кодлари ҳам ишлайди)</label>
                    <textarea id="p-text" rows="6"></textarea>
                </div>

                <button class="btn-enter" onclick="save()">САҚЛАШ</button>
            </div>
        </div>

        <div id="manage" class="section">
            <h1>Мақолалар рўйхати</h1>
            <div class="card">
                <table id="list-table">
                    <thead><tr><th>Сарлавҳа</th><th>Бўлим</th><th>Амал</th></tr></thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const _HASH = "NzUyOA=="; // Пароль: 7528
    const IMGBB_API_KEY = "6f5298966779426f83f2081d0f5c1d76"; // Бепул API калит

    function checkAuth() {
        const u = document.getElementById('user_in').value;
        const p = document.getElementById('pass_in').value;
        if(u === 'admin' && btoa(p) === _HASH) {
            sessionStorage.setItem('adminStatus', 'authorized');
            openAdmin();
        } else {
            document.getElementById('error').innerText = "Логин ёки пароль хато!";
        }
    }

    function openAdmin() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'block';
        updateStats();
    }

    function tab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        document.getElementById('tab-' + id).classList.add('active');
        if(id === 'manage') loadTable();
        if(id === 'stats') updateStats();
    }

    // Расмни ImgBB га юклаш функцияси
    async function uploadImage(input) {
        if (!input.files || !input.files[0]) return;
        
        const preview = document.getElementById('img-preview');
        const imgInput = document.getElementById('p-img');
        
        imgInput.value = "Юкланмоқда...";
        const formData = new FormData();
        formData.append("image", input.files[0]);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                const url = result.data.url;
                imgInput.value = url;
                preview.src = url;
                preview.style.display = "block";
            } else {
                alert("Расм юклашда хатолик бўлди.");
            }
        } catch (err) {
            alert("Сервер билан алоқа йўқ.");
        }
    }

    function processVideoLink(url) {
        if (!url) return "";
        // YouTube
        if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
        if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
        // Facebook
        if (url.includes("facebook.com")) {
            return "FB|" + encodeURIComponent(url);
        }
        return url;
    }

    function save() {
        const title = document.getElementById('p-title').value.trim();
        const text = document.getElementById('p-text').value.trim();
        const cat = document.getElementById('p-cat').value;
        const editId = document.getElementById('edit-id').value;
        let videoLink = document.getElementById('p-video').value.trim();
        let imgInput = document.getElementById('p-img').value.trim();

        if(!title || !text) { alert("Маълумотларни тўлдиринг!"); return; }

        let posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];

        const postData = { 
            title: title, 
            content: text, 
            category: cat, 
            video: processVideoLink(videoLink), 
            image: imgInput,
            date: new Date().toLocaleString(),
            views: editId === "-1" ? 0 : (posts[editId].views || 0)
        };

        if(editId === "-1") {
            posts.push(postData);
        } else {
            posts[editId] = postData;
        }

        localStorage.setItem('choyhona_posts', JSON.stringify(posts));
        alert("Муваффақиятли сақланди!");
        resetForm();
        tab('manage');
    }

    function resetForm() {
        document.getElementById('p-title').value = "";
        document.getElementById('p-text').value = "";
        document.getElementById('p-video').value = "";
        document.getElementById('p-img').value = "";
        document.getElementById('img-preview').style.display = "none";
        document.getElementById('edit-id').value = "-1";
        document.getElementById('f-title').innerText = "Янги мақола";
    }

    function loadTable() {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const body = document.getElementById('list-body');
        body.innerHTML = "";
        posts.forEach((p, i) => {
            body.innerHTML += `<tr>
                <td>${p.title.substring(0, 40)}...</td>
                <td>${p.category}</td>
                <td>
                    <button class="action-btn" style="background:var(--success)" onclick="edit(${i})"><i class="fas fa-edit"></i></button>
                    <button class="action-btn" style="background:var(--danger)" onclick="del(${i})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    function edit(i) {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts'));
        const p = posts[i];
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-text').value = p.content;
        document.getElementById('p-cat').value = p.category;
        
        let v = p.video || "";
        if (v.startsWith("FB|")) v = decodeURIComponent(v.replace("FB|", ""));
        document.getElementById('p-video').value = v;
        
        document.getElementById('p-img').value = p.image || "";
        document.getElementById('edit-id').value = i;
        document.getElementById('f-title').innerText = "Таҳрирлаш";
        tab('add');
    }

    function del(i) {
        if(confirm("Ўчирилсинми?")) {
            let posts = JSON.parse(localStorage.getItem('choyhona_posts'));
            posts.splice(i, 1);
            localStorage.setItem('choyhona_posts', JSON.stringify(posts));
            loadTable();
            updateStats();
        }
    }

    function updateStats() {
        const posts = JSON.parse(localStorage.getItem('choyhona_posts')) || [];
        const totalViews = posts.reduce((sum, p) => sum + (Number(p.views) || 0), 0);
        document.getElementById('stat-view').innerHTML = `
            <div class="stat-card" style="border-bottom-color: #3498db;"><h3>Кўрилди</h3><h2>${totalViews}</h2></div>
            <div class="stat-card"><h3>Мақолалар</h3><h2>${posts.length}</h2></div>
            <div class="stat-card" style="border-bottom-color: #27ae60;"><h3>Шеърият</h3><h2>${posts.filter(p=>p.category==='poetry').length}</h2></div>
        `;
    }

    function logout() { sessionStorage.clear(); location.reload(); }
    window.onload = () => { if(sessionStorage.getItem('adminStatus') === 'authorized') openAdmin(); }
</script>
</body>
</html>
