<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Бошқарув</title>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Ruslan+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --blue: #007bff; --gold: #f4e4bc; --bg: #0f0a00; --card: #1a1201; }
        body { background: var(--bg); color: var(--gold); font-family: 'Alice', serif; margin: 0; padding: 0; }
        
        /* КИРИШ ОЙНАСИ */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card); padding: 40px; border: 2px solid var(--blue); border-radius: 15px; text-align: center; width: 320px; }
        
        #admin-content { display: none; }
        
        .nav-bar { background: var(--card); padding: 15px; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-around; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-bar a { color: var(--blue); text-decoration: none; font-weight: bold; }

        /* ИККИ УСТУНЛИ КОНТЕЙНЕР */
        .admin-wrapper { display: flex; max-width: 1400px; margin: 25px auto; gap: 20px; padding: 0 20px; align-items: flex-start; }

        /* ЧАП ТОМОН (ФОРМА) */
        .editor-section { flex: 1; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--blue); position: sticky; top: 90px; }
        
        /* ЎНГ ТОМОН (ЖАДВАЛ) */
        .manager-section { flex: 1.5; background: var(--card); border: 1px solid var(--blue); border-radius: 15px; padding: 20px; max-height: 85vh; overflow-y: auto; }

        h2 { color: var(--blue); font-family: 'Ruslan Display', cursive; text-align: center; margin-top: 0; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--blue); color: #fff; border-radius: 6px; box-sizing: border-box; font-family: 'Alice', serif; }

        .btn-blue { background: var(--blue); color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-danger { background: #ff4d4d; border: none; padding: 6px 10px; border-radius: 4px; color: white; cursor: pointer; }
        .btn-edit { background: #ffc107; border: none; padding: 6px 10px; border-radius: 4px; color: black; cursor: pointer; margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #3d2602; padding: 10px; text-align: left; }
        th { color: var(--blue); position: sticky; top: 0; background: var(--card); }
        .cat-badge { background: #3d2602; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--blue); }

        /* Scrollbar дизайни */
        .manager-section::-webkit-scrollbar { width: 6px; }
        .manager-section::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }

        @media (max-width: 1000px) { .admin-wrapper { flex-direction: column; } .editor-section { position: static; width: 100%; } .manager-section { width: 100%; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 КИРИШ</h2>
        <input type="password" id="passInput" placeholder="Паролни ёзинг...">
        <button class="btn-blue" onclick="verify()">КИРИШ</button>
    </div>
</div>

<div id="admin-content">
    <div class="nav-bar">
        <a href="index.html"><i class="fas fa-home"></i> САЙТГА ЎТИШ</a>
        <h3 style="margin:0; color:var(--blue);">CHAYHANA ADMIN</h3>
        <button onclick="logout()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; cursor:pointer; padding:5px 15px; border-radius:5px;">ЧИҚИШ</button>
    </div>

    <div class="admin-wrapper">
        <div class="editor-section" id="form-section">
            <h2 id="form-title">ЯНГИ МАҚОЛА</h2>
            <input type="hidden" id="edit-id">
            <input type="hidden" id="edit-cat">

            <input type="text" id="title" placeholder="Сарлавҳа...">
            <select id="category">
                <option value="">-- Бўлимни танланг --</option>
                <option value="main">🏠 Асосий саҳифа</option>
                <option value="health">🌿 Саломатлик</option>
                <option value="poetry">📜 Шеърият</option>
                <option value="cockes">🍲 Ширин таомлар</option>
                <optgroup label="🎬 Кинотеатр">
                    <option value="cinema_drama">🎭 Драма</option>
                    <option value="cinema_triller">🔪 Триллер</option>
                    <option value="cinema_komediya">😂 Комедия</option>
                    <option value="cinema_jangari">👊 Боевик</option>
                    <option value="cinema_fantastika">👽 Фантастика</option>
                    <option value="cinema_horror">👻 Ужас</option>
                    <option value="retro_uzbek">🎥 Ўзбек Ретро</option>
                    <option value="retro_sssr">🚩 СССР Ретро</option>
                </optgroup>
            </select>
            <input type="text" id="imgUrl" placeholder="Расм линки...">
            <textarea id="videoIframe" rows="2" placeholder="Embed код (<iframe>)..."></textarea>
            <textarea id="textContent" rows="5" placeholder="Матн..."></textarea>
            
            <button class="btn-blue" id="submitBtn" onclick="saveData()">🚀 САЙТГА ЮБОРИШ</button>
            <button class="btn-danger" id="cancelBtn" onclick="resetForm()" style="width:100%; margin-top:10px; display:none;">БЕКОР ҚИЛИШ</button>
        </div>

        <div class="manager-section">
            <h2>МАЪЛУМОТЛАР</h2>
            <table>
                <thead>
                    <tr>
                        <th>Сарлавҳа</th>
                        <th>Бўлим</th>
                        <th>Амаллар</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const secret = "MTIzNA=="; // Пароль: 1234
    const firebaseConfig = {
        apiKey: "AIzaSyB9knDUC93Z5nghmLh8OCzkOI_w9q4p1eY",
        authDomain: "namanganchayhana.firebaseapp.com",
        databaseURL: "https://namanganchayhana-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "namanganchayhana",
        storageBucket: "namanganchayhana.firebasestorage.app",
        messagingSenderId: "760810654853",
        appId: "1:760810654853:web:f851116bc7a621e4c52dec"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verify() {
        if (btoa(document.getElementById('passInput').value) === secret) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadPosts();
        } else { alert("Хато пароль!"); }
    }

    function logout() { location.reload(); }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const oldCat = document.getElementById('edit-cat').value;
        const title = document.getElementById('title').value;
        const cat = document.getElementById('category').value;
        const text = document.getElementById('textContent').value;
        const img = document.getElementById('imgUrl').value;
        const iframe = document.getElementById('videoIframe').value;

        if(!title || !cat) return alert("Сарлавҳа ва бўлимни танланг!");

        const postData = { title, text, category: cat, image: img, iframe, time: new Date().toLocaleString() };

        if(id) {
            if(oldCat !== cat) { await db.ref('posts/' + oldCat + '/' + id).remove(); }
            await db.ref('posts/' + cat + '/' + id).set(postData);
            alert("Ўзгартирилди!");
        } else {
            await db.ref('posts/' + cat).push(postData);
            alert("Юборилди!");
        }
        resetForm();
    }

    function loadPosts() {
        db.ref('posts').on('value', (snapshot) => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            snapshot.forEach((category) => {
                category.forEach((post) => {
                    const data = post.val();
                    const key = post.key;
                    tbody.innerHTML += `
                        <tr>
                            <td><div style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${data.title}</div></td>
                            <td><span class="cat-badge">${category.key}</span></td>
                            <td>
                                <button class="btn-edit" onclick="editPost('${key}', '${category.key}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-danger" onclick="deletePost('${key}', '${category.key}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            });
        });
    }

    async function deletePost(id, cat) {
        if(confirm("Ростан ҳам ўчирмоқчимисиз?")) {
            await db.ref('posts/' + cat + '/' + id).remove();
        }
    }

    function editPost(id, cat) {
        db.ref('posts/' + cat + '/' + id).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-cat').value = cat;
            document.getElementById('title').value = data.title;
            document.getElementById('category').value = cat;
            document.getElementById('textContent').value = data.text;
            document.getElementById('imgUrl').value = data.image;
            document.getElementById('videoIframe').value = data.iframe;
            
            document.getElementById('form-title').innerText = "ТАҲРИРЛАШ";
            document.getElementById('submitBtn').innerText = "💾 САҚЛАШ";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('edit-cat').value = "";
        document.getElementById('title').value = "";
        document.getElementById('textContent').value = "";
        document.getElementById('imgUrl').value = "";
        document.getElementById('videoIframe').value = "";
        document.getElementById('category').value = "";
        document.getElementById('form-title').innerText = "ЯНГИ МАҚОЛА";
        document.getElementById('submitBtn').innerText = "🚀 САЙТГА ЮБОРИШ";
        document.getElementById('cancelBtn').style.display = "none";
    }
</script>
</body>
</html>
