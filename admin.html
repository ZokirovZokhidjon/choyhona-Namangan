<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чойхона - Cosmic Admin PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-orange: #ff6a00; 
            --neon-blue: #00d4ff; 
            --dark-space: #0f172a;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #000); 
            color: white; margin: 0; padding: 10px; min-height: 100vh; overflow-x: hidden;
        }

        /* --- ЛОГИН ОЙНАСИ --- */
        #login-overlay { 
            position: fixed; inset: 0; background: var(--dark-space); 
            display: flex; justify-content: center; align-items: center; z-index: 10000; 
        }
        .login-box { 
            background: var(--glass); backdrop-filter: blur(20px); border: 2px solid var(--neon-blue);
            padding: 30px; border-radius: 30px; text-align: center; width: 320px; 
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .login-box input { 
            width: 100%; margin: 10px 0; padding: 12px; border-radius: 15px; 
            background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; outline: none; box-sizing: border-box;
        }
        .login-box button { 
            background: linear-gradient(45deg, var(--neon-orange), #ee0979); 
            color: white; border: none; width: 100%; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold;
        }

        /* --- АДМИН ПАНЕЛ --- */
        #admin-wrapper { display: none; max-width: 1200px; margin: 0 auto; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-panel { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .glass-box { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 25px; backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 18px; }
        input, textarea, select { 
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(0,0,0,0.6); border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; font-size: 16px;
        }

        .btn-neon { 
            background: linear-gradient(45deg, #00d4ff, #0055ff); border: none; 
            padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; width: 100%;
        }

        /* КИМИРЛАБ ТУРАДИГАН КАРТОЧКАЛАР (Анимацияли) */
        .post-item { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .post-item:hover { 
            transform: scale(1.02); background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .post-info { display: flex; justify-content: space-between; align-items: flex-start; }
        .post-title { font-weight: bold; color: var(--neon-blue); }
        .post-date { font-size: 10px; color: #888; }
        
        .action-btns { display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
        .btn-act { background: none; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-act:hover { transform: translateY(-3px); }

        /* Мобил созламалар */
        @media (max-width: 800px) {
            .main-panel { grid-template-columns: 1fr; }
            .login-box { width: 90%; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div style="font-size: 50px; margin-bottom: 10px;">🚀</div>
        <h2 style="letter-spacing: 2px;">COMMAND CENTER</h2>
        <input type="text" id="u_name" placeholder="Логин">
        <input type="password" id="u_pass" placeholder="Пароль">
        <button onclick="checkAuth()">Authentication</button>
        <a href="index.html" style="color: #666; text-decoration: none; display: block; margin-top: 15px; font-size: 12px;">← Return to Earth</a>
    </div>
</div>

<div id="admin-wrapper">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3><i class="fas fa-rocket"></i> ПАНЕЛ</h3>
        <button onclick="logout()" style="background:none; border:1px solid #e74c3c; color:#e74c3c; padding:5px 15px; border-radius:10px; cursor:pointer;">EXIT</button>
    </div>

    <div class="main-panel">
        <div class="glass-box">
            <h2><i class="fas fa-plus-circle"></i> ЯНГИ КОНТЕНТ</h2>
            <input type="text" id="p-title" placeholder="Сарлавҳа...">
            <select id="p-cat">
                <option value="main">🏠 Асосий саҳифа</option>
                <option value="news">📰 Янгиликлар</option>
                <option value="cockes">🍲 Ширин таомлар</option>
                <option value="classic">🎵 Мумтоз наволар</option>
                <option value="poetry">✍️ Шеърият</option>
                <option value="health">🩺 Саломатлик</option>
                 <option value="fishing">🩺 балик ови</option>
                <optgroup label="🎬 КИНОТЕАТР">
                    <option value="action">🔥 Боевик</option>
                    <option value="detective">🕵️ Детектив</option>
                    <option value="horror">👻 Қўрқинчли</option>
                    <option value="drama">🎭 Драма</option>
                    <option value="cinema">🎥 Барча кинолар</option>
                </optgroup>
            </select>
            <input type="text" id="p-video" placeholder="YouTube Video ID">
            <input type="text" id="p-img" placeholder="Расм линки (ImgBB)">
            <textarea id="p-text" rows="5" placeholder="Матн..."></textarea>
            <button class="btn-neon" id="save-btn" onclick="savePost()">САҚЛАШ</button>
        </div>

        <div class="glass-box">
            <h2><i class="fas fa-database"></i> БУЛУТДАГИ МАЪЛУМОТЛАР</h2>
            <div id="posts-list">
                <p style="color:#666; text-align:center;">Юкланмоқда...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase Конфигурацияси
    const firebaseConfig = {
        apiKey: "AIzaSyDGW-7Yhgx7myEpz9rlzrbtExwb03tnszs",
        authDomain: "chayhananamangan.firebaseapp.com",
        projectId: "chayhananamangan",
        storageBucket: "chayhananamangan.firebasestorage.app",
        messagingSenderId: "600906823282",
        appId: "1:600906823282:web:e6756453dcb3351ffe34eb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;

    // ЛОГИН ФУНКЦИЯСИ
    function checkAuth() {
        const u = document.getElementById('u_name').value;
        const p = document.getElementById('u_pass').value;
        if(u === "admin" && p === "7528") {
            sessionStorage.setItem('choyhona_admin', 'true');
            loadAdmin();
        } else { 
            alert("Хато!"); 
        }
    }

    function loadAdmin() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'block';
        renderList();
    }

    // БАЗАГА САҚЛАШ
    async function savePost() {
        const title = document.getElementById('p-title').value;
        const text = document.getElementById('p-text').value;
        if(!title || !text) { alert("Тўлдиринг!"); return; }

        const postData = {
            title: title,
            content: text,
            category: document.getElementById('p-cat').value,
            video: document.getElementById('p-video').value,
            image: document.getElementById('p-img').value,
            date: new Date().toLocaleString(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if(editId) {
                await db.collection("posts").doc(editId).update(postData);
                editId = null;
                document.getElementById('save-btn').innerText = "САҚЛАШ";
            } else {
                await db.collection("posts").add(postData);
            }
            clearForm();
            alert("Муваффақиятли бажарилди!");
        } catch (e) { alert("Хато: " + e); }
    }

    // РЎЙХАТНИ ЧИҚАРИШ (АНИМАЦИЯЛИ)
    function renderList() {
        db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('posts-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="post-item">
                        <div class="post-info">
                            <div>
                                <div class="post-title">${p.title}</div>
                                <div style="font-size:11px; color:var(--neon-orange)">${p.category}</div>
                            </div>
                            <div class="post-date">${p.date}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn-act" onclick="editPost('${doc.id}', \`${p.title}\`, \`${p.category}\`, \`${p.video}\`, \`${p.image}\`, \`${p.content}\`)" style="color:var(--neon-blue)">
                                <i class="fa fa-edit"></i> Таҳрир
                            </button>
                            <button class="btn-act" onclick="deletePost('${doc.id}')" style="color:#e74c3c">
                                <i class="fa fa-trash"></i> Ўчириш
                            </button>
                        </div>
                    </div>`;
            });
        });
    }

    function editPost(id, t, c, v, i, txt) {
        editId = id;
        document.getElementById('p-title').value = t;
        document.getElementById('p-cat').value = c;
        document.getElementById('p-video').value = v;
        document.getElementById('p-img').value = i;
        document.getElementById('p-text').value = txt;
        document.getElementById('save-btn').innerText = "ЯНГИЛАШНИ САҚЛАШ";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deletePost(id) {
        if(confirm("Бу маълумот базадан бутунлай ўчади. Розимисиз?")) {
            await db.collection("posts").doc(id).delete();
        }
    }

    function clearForm() {
        document.getElementById('p-title').value = "";
        document.getElementById('p-video').value = "";
        document.getElementById('p-img').value = "";
        document.getElementById('p-text').value = "";
    }

    function logout() { sessionStorage.clear(); location.reload(); }

    window.onload = () => { 
        if(sessionStorage.getItem('choyhona_admin')) loadAdmin(); 
    }
</script>
</body>
</html>
